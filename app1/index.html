<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="100Q">
<meta name="theme-color" content="#0C1B0E">
<title>100Q — Qur'anic Phrases</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root { --font-scale: 1; }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body, #root { height: 100%; overflow: hidden; }
  body { background: #0C1B0E; }

  .app {
    min-height: 100vh; min-height: 100dvh;
    background: linear-gradient(170deg, #0C1B0E 0%, #1A2F1C 40%, #0F1F12 100%);
    font-family: 'Cormorant Garamond', Georgia, serif;
    color: #E8E0D4;
    display: flex; flex-direction: column;
    overflow: hidden; position: relative;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
  }

  .card-wrapper { perspective: 1200px; width: 100%; max-width: 420px; margin: 0 auto; }
  .card-inner {
    position: relative; width: 100%; min-height: 340px;
    transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1);
    transform-style: preserve-3d; cursor: pointer;
  }
  .card-inner.flipped { transform: rotateY(180deg); }
  .card-face {
    position: absolute; inset: 0;
    backface-visibility: hidden; -webkit-backface-visibility: hidden;
    border-radius: 20px;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    padding: 32px 24px; overflow: hidden;
  }
  .card-front {
    background: linear-gradient(145deg, #1C2E1E 0%, #162516 50%, #1A2A1B 100%);
    border: 1px solid rgba(212, 168, 84, 0.2);
    box-shadow: 0 20px 60px rgba(0,0,0,0.4), inset 0 1px 0 rgba(212,168,84,0.08);
  }
  .card-back {
    background: linear-gradient(145deg, #2A1F10 0%, #1F1708 50%, #2A1F10 100%);
    border: 1px solid rgba(212, 168, 84, 0.3);
    box-shadow: 0 20px 60px rgba(0,0,0,0.4), inset 0 1px 0 rgba(212,168,84,0.12);
    transform: rotateY(180deg);
  }

  .ornament { position: absolute; width: 60px; height: 1px; background: linear-gradient(90deg, transparent, rgba(212,168,84,0.4), transparent); }
  .ornament-top { top: 20px; } .ornament-bottom { bottom: 20px; }
  .ornament-dot { position: absolute; width: 5px; height: 5px; border-radius: 50%; background: rgba(212,168,84,0.3); left: 50%; transform: translateX(-50%); }
  .ornament-dot-top { top: 12px; } .ornament-dot-bottom { bottom: 12px; }

  .arabic-text {
    font-family: 'Amiri', 'Traditional Arabic', serif;
    font-size: calc(clamp(22px, 5.5vw, 32px) * var(--font-scale)); line-height: 1.9; color: #F5EDE0;
    text-align: center; direction: rtl; margin-bottom: 28px;
    letter-spacing: 0.02em; text-shadow: 0 1px 8px rgba(0,0,0,0.3);
  }
  .translit-text {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: calc(clamp(14px, 3.5vw, 17px) * var(--font-scale)); font-style: italic;
    color: rgba(212, 168, 84, 0.75); text-align: center; line-height: 1.6; letter-spacing: 0.03em;
  }
  .english-text {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: calc(clamp(18px, 4.5vw, 24px) * var(--font-scale)); font-weight: 400; color: #F5EDE0;
    text-align: center; line-height: 1.7; letter-spacing: 0.01em;
  }
  .tap-hint {
    font-size: 12px; color: rgba(212,168,84,0.35);
    text-transform: uppercase; letter-spacing: 0.2em; margin-top: 16px;
    font-family: 'Cormorant Garamond', Georgia, serif;
  }

  .nav-btn {
    background: rgba(212,168,84,0.08); border: 1px solid rgba(212,168,84,0.2);
    border-radius: 14px; color: #D4A854; padding: 12px 20px;
    font-family: 'Cormorant Garamond', Georgia, serif; font-size: 14px;
    letter-spacing: 0.08em; cursor: pointer; transition: all 0.2s;
    display: flex; align-items: center; gap: 6px; white-space: nowrap;
  }
  .nav-btn:active { background: rgba(212,168,84,0.18); transform: scale(0.97); }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }
  .nav-btn:disabled:active { transform: none; background: rgba(212,168,84,0.08); }

  .mark-btn {
    background: rgba(212,168,84,0.08); border: 1px solid rgba(212,168,84,0.25);
    border-radius: 14px; color: #D4A854; padding: 10px 16px;
    font-family: 'Cormorant Garamond', Georgia, serif; font-size: 13px;
    letter-spacing: 0.06em; cursor: pointer; transition: all 0.2s;
    display: flex; align-items: center; gap: 6px;
  }
  .mark-btn:active { transform: scale(0.97); }
  .mark-btn.active { background: rgba(212,168,84,0.15); border-color: rgba(212,168,84,0.45); }

  .header-btn {
    background: none; border: 1px solid rgba(212,168,84,0.18);
    border-radius: 10px; color: #D4A854; padding: 8px 14px;
    font-family: 'Cormorant Garamond', Georgia, serif; font-size: 13px;
    letter-spacing: 0.06em; cursor: pointer;
    display: flex; align-items: center; gap: 6px; transition: all 0.2s; white-space: nowrap;
  }
  .header-btn:active { background: rgba(212,168,84,0.1); }

  .icon-btn {
    background: none; border: 1px solid rgba(212,168,84,0.15);
    border-radius: 10px; color: #D4A854; padding: 7px 9px;
    cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center;
  }
  .icon-btn:active { background: rgba(212,168,84,0.1); }

  .progress-track { width: 100%; max-width: 420px; height: 3px; background: rgba(212,168,84,0.1); border-radius: 2px; margin: 0 auto; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, rgba(212,168,84,0.3), rgba(212,168,84,0.6)); border-radius: 2px; transition: width 0.4s ease; }

  @keyframes slideIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .slideIn { animation: slideIn 0.25s ease; }
  @keyframes slideOutLeft { to { opacity: 0; transform: translateX(-40px); } }
  .slideOutLeft { animation: slideOutLeft 0.2s ease forwards; }
  @keyframes slideOutRight { to { opacity: 0; transform: translateX(40px); } }
  .slideOutRight { animation: slideOutRight 0.2s ease forwards; }

  .badge { background: rgba(212,168,84,0.25); color: #D4A854; font-size: 11px; font-weight: 600; padding: 2px 7px; border-radius: 8px; min-width: 20px; text-align: center; }
  .empty-state { text-align: center; padding: 40px 20px; }

  /* Mode toggle */
  .mode-toggle { display: flex; background: rgba(212,168,84,0.06); border: 1px solid rgba(212,168,84,0.15); border-radius: 10px; overflow: hidden; flex-shrink: 0; }
  .mode-toggle-btn {
    padding: 7px 10px; font-size: 11px; letter-spacing: 0.08em;
    text-transform: uppercase; cursor: pointer; transition: all 0.25s;
    font-family: 'Cormorant Garamond', Georgia, serif;
    color: rgba(212,168,84,0.45); background: none; border: none; font-weight: 500;
  }
  .mode-toggle-btn.active { color: #D4A854; background: rgba(212,168,84,0.12); }

  /* Multiple Choice */
  .mc-question-card {
    width: 100%; max-width: 420px; margin: 0 auto;
    background: linear-gradient(145deg, #1C2E1E 0%, #162516 50%, #1A2A1B 100%);
    border: 1px solid rgba(212, 168, 84, 0.2);
    box-shadow: 0 16px 48px rgba(0,0,0,0.35), inset 0 1px 0 rgba(212,168,84,0.08);
    border-radius: 20px; padding: 28px 24px 24px; position: relative; overflow: hidden;
  }
  .mc-option {
    width: 100%; max-width: 420px; margin: 0 auto;
    background: rgba(212,168,84,0.04); border: 1px solid rgba(212,168,84,0.15);
    border-radius: 14px; padding: 14px 18px;
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: calc(clamp(14px, 3.5vw, 16px) * var(--font-scale)); color: #E8E0D4;
    text-align: left; cursor: pointer; transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    display: flex; align-items: flex-start; gap: 12px; line-height: 1.5;
  }
  .mc-option:active:not(.mc-locked) { transform: scale(0.98); }
  .mc-option:not(.mc-locked):hover { background: rgba(212,168,84,0.08); border-color: rgba(212,168,84,0.3); }
  .mc-option.mc-locked { cursor: default; }
  .mc-option.mc-correct { background: rgba(76,175,80,0.12); border-color: rgba(76,175,80,0.5); color: #A5D6A7; }
  .mc-option.mc-wrong { background: rgba(229,115,115,0.1); border-color: rgba(229,115,115,0.4); color: #EF9A9A; }
  .mc-option.mc-dimmed { opacity: 0.35; }
  .mc-option .arabic-text { font-size: calc(clamp(18px, 4.5vw, 24px) * var(--font-scale)); margin-bottom: 0; line-height: 1.6; }

  .mc-letter {
    flex-shrink: 0; width: 26px; height: 26px; border-radius: 50%;
    border: 1px solid rgba(212,168,84,0.25); display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 600; color: rgba(212,168,84,0.6); transition: all 0.25s;
  }
  .mc-correct .mc-letter { background: rgba(76,175,80,0.2); border-color: rgba(76,175,80,0.5); color: #A5D6A7; }
  .mc-wrong .mc-letter { background: rgba(229,115,115,0.15); border-color: rgba(229,115,115,0.4); color: #EF9A9A; }

  .mc-scoreboard { display: flex; justify-content: center; gap: 4px; padding: 0 20px; flex-shrink: 0; }
  .mc-score-item { display: flex; align-items: center; gap: 5px; padding: 5px 10px; border-radius: 8px; font-size: 12px; letter-spacing: 0.06em; }
  .mc-score-item.correct { color: #A5D6A7; background: rgba(76,175,80,0.08); }
  .mc-score-item.wrong { color: #EF9A9A; background: rgba(229,115,115,0.06); }
  .mc-score-item.review { color: #D4A854; background: rgba(212,168,84,0.08); }
  .mc-score-item.unanswered { color: rgba(212,168,84,0.45); background: rgba(212,168,84,0.04); }
  .mc-score-num { font-weight: 600; font-size: 15px; }

  @keyframes mcReveal { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .mc-reveal { animation: mcReveal 0.3s ease both; }
  .mc-reveal-1 { animation-delay: 50ms; } .mc-reveal-2 { animation-delay: 100ms; }
  .mc-reveal-3 { animation-delay: 150ms; } .mc-reveal-4 { animation-delay: 200ms; }

  /* Summary / Completion */
  .mc-complete { text-align: center; padding: 32px 20px; max-width: 380px; margin: 0 auto; }
  .mc-complete-icon { font-size: 48px; margin-bottom: 16px; }
  .mc-complete-title { font-size: 28px; color: #F5EDE0; font-weight: 300; margin-bottom: 8px; }
  .mc-complete-subtitle { font-size: 15px; color: rgba(212,168,84,0.5); margin-bottom: 28px; }
  .mc-final-stats { display: flex; justify-content: center; gap: 20px; margin-bottom: 32px; flex-wrap: wrap; }
  .mc-final-stat { text-align: center; }
  .mc-final-stat-num { font-size: 32px; font-weight: 300; display: block; margin-bottom: 2px; }
  .mc-final-stat-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.2em; }
  .mc-final-stat.correct .mc-final-stat-num { color: #A5D6A7; }
  .mc-final-stat.wrong .mc-final-stat-num { color: #EF9A9A; }
  .mc-final-stat.review .mc-final-stat-num { color: #D4A854; }

  .mc-unanswered-btn { color: rgba(212,168,84,0.7) !important; border-color: rgba(212,168,84,0.2) !important; }
  .mc-finish-btn { background: rgba(76,175,80,0.08) !important; border-color: rgba(76,175,80,0.25) !important; color: #A5D6A7 !important; }

  /* Modal overlay */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,0.7);
    display: flex; align-items: center; justify-content: center;
    padding: 20px; backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .modal-content {
    background: linear-gradient(145deg, #1C2E1E 0%, #162516 100%);
    border: 1px solid rgba(212,168,84,0.25); border-radius: 20px;
    padding: 28px 24px; max-width: 400px; width: 100%; max-height: 80vh;
    overflow-y: auto; position: relative;
  }
  .modal-title { font-size: 20px; color: #F5EDE0; font-weight: 400; margin-bottom: 20px; text-align: center; }
  .modal-close {
    position: absolute; top: 16px; right: 16px; background: none; border: none;
    color: rgba(212,168,84,0.5); cursor: pointer; font-size: 20px; padding: 4px;
  }

  /* Settings */
  .setting-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid rgba(212,168,84,0.08); }
  .setting-label { font-size: 14px; color: #E8E0D4; }
  .setting-sublabel { font-size: 11px; color: rgba(212,168,84,0.4); margin-top: 2px; }
  .font-controls { display: flex; gap: 8px; align-items: center; }
  .font-btn {
    width: 32px; height: 32px; border-radius: 8px; border: 1px solid rgba(212,168,84,0.2);
    background: rgba(212,168,84,0.06); color: #D4A854; font-size: 16px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; transition: all 0.2s;
  }
  .font-btn:active { background: rgba(212,168,84,0.15); }
  .font-size-val { font-size: 13px; color: rgba(212,168,84,0.6); min-width: 36px; text-align: center; }

  /* Toggle switch */
  .toggle { position: relative; width: 42px; height: 24px; cursor: pointer; flex-shrink: 0; }
  .toggle input { display: none; }
  .toggle-track {
    position: absolute; inset: 0; border-radius: 12px;
    background: rgba(212,168,84,0.1); border: 1px solid rgba(212,168,84,0.15);
    transition: all 0.3s;
  }
  .toggle input:checked + .toggle-track { background: rgba(212,168,84,0.25); border-color: rgba(212,168,84,0.4); }
  .toggle-thumb {
    position: absolute; top: 3px; left: 3px; width: 18px; height: 18px; border-radius: 50%;
    background: rgba(212,168,84,0.5); transition: all 0.3s;
  }
  .toggle input:checked ~ .toggle-thumb { left: 21px; background: #D4A854; }

  /* Category filter pills */
  .cat-pills { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .cat-pill {
    padding: 5px 10px; border-radius: 10px; font-size: 11px; letter-spacing: 0.06em;
    border: 1px solid rgba(212,168,84,0.15); background: rgba(212,168,84,0.04);
    color: rgba(212,168,84,0.5); cursor: pointer; transition: all 0.2s; text-transform: uppercase;
  }
  .cat-pill.active { background: rgba(212,168,84,0.15); border-color: rgba(212,168,84,0.4); color: #D4A854; }

  /* Phrase of the Day */
  .potd-card {
    max-width: 420px; width: 100%; margin: 0 auto;
    background: linear-gradient(145deg, #1C2E1E 0%, #162516 50%, #1A2A1B 100%);
    border: 1px solid rgba(212,168,84,0.25); border-radius: 20px;
    padding: 32px 24px; position: relative; overflow: hidden;
  }
  .potd-meta { font-size: 11px; color: rgba(212,168,84,0.4); letter-spacing: 0.15em; text-transform: uppercase; text-align: center; margin-top: 16px; }
  .potd-ref {
    margin-top: 20px; padding-top: 16px; border-top: 1px solid rgba(212,168,84,0.1);
    font-size: 13px; color: rgba(212,168,84,0.5); line-height: 1.7; text-align: center;
  }
  .potd-date { font-size: 12px; color: rgba(212,168,84,0.35); letter-spacing: 0.12em; text-align: center; margin-bottom: 20px; }

  /* Surah ref expandable */
  .ref-toggle {
    background: none; border: none; color: rgba(212,168,84,0.45); font-size: 11px;
    letter-spacing: 0.12em; text-transform: uppercase; cursor: pointer;
    font-family: 'Cormorant Garamond', Georgia, serif; padding: 6px 0; transition: color 0.2s;
  }
  .ref-toggle:hover { color: rgba(212,168,84,0.7); }
  .ref-detail {
    font-size: 12px; color: rgba(212,168,84,0.4); line-height: 1.7;
    padding: 8px 0 4px; text-align: center;
  }


  /* Keyboard shortcuts modal */
  .shortcut-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; }
  .shortcut-key {
    background: rgba(212,168,84,0.1); border: 1px solid rgba(212,168,84,0.2);
    border-radius: 6px; padding: 3px 8px; font-size: 12px; color: #D4A854;
    font-family: monospace; min-width: 28px; text-align: center;
  }
  .shortcut-desc { font-size: 13px; color: rgba(212,168,84,0.5); }

  /* Share button */
  .share-btn {
    background: linear-gradient(135deg, rgba(212,168,84,0.12), rgba(212,168,84,0.06));
    border: 1px solid rgba(212,168,84,0.25); border-radius: 14px;
    color: #D4A854; padding: 12px 24px; font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 14px; letter-spacing: 0.08em; cursor: pointer; transition: all 0.2s;
    display: flex; align-items: center; gap: 8px; justify-content: center;
  }
  .share-btn:active { transform: scale(0.97); background: rgba(212,168,84,0.18); }

  /* Review mistakes list */
  .mistake-item {
    padding: 14px 16px; border-bottom: 1px solid rgba(212,168,84,0.06);
    cursor: pointer; transition: background 0.2s;
  }
  .mistake-item:active { background: rgba(212,168,84,0.06); }
  .mistake-ar { font-family: 'Amiri', serif; font-size: 18px; color: #F5EDE0; direction: rtl; text-align: right; margin-bottom: 4px; }
  .mistake-en { font-size: 13px; color: rgba(212,168,84,0.5); }

  /* Toast notification */
  .toast {
    position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
    background: rgba(212,168,84,0.15); border: 1px solid rgba(212,168,84,0.3);
    border-radius: 12px; padding: 10px 20px; font-size: 13px; color: #D4A854;
    z-index: 200; animation: toastIn 0.3s ease, toastOut 0.3s ease 1.7s forwards;
    backdrop-filter: blur(8px); white-space: nowrap;
  }
  @keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(10px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
  @keyframes toastOut { to { opacity: 0; transform: translateX(-50%) translateY(-10px); } }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script>

var e = React.createElement;
var useState = React.useState, useEffect = React.useEffect, useCallback = React.useCallback, useRef = React.useRef, useMemo = React.useMemo;

var PHRASES = [
  {id:1,ar:"بِسْمِ اللّٰهِ الرَّحْمٰنِ الرَّحِيْمِ",tr:"Bismillāhi r-Raḥmāni r-Raḥīm",en:"In the name of Allah, the Most Gracious, the Most Merciful",cat:"dua",freq:114,refs:"Al-Fatihah, and beginning of every surah except At-Tawbah"},
  {id:2,ar:"اِنَّ اللّٰهَ غَفُوْرٌ رَّحِيْمٌ",tr:"Inna Allāha Ghafūrun Raḥīm",en:"Indeed, Allah is Forgiving, Merciful",cat:"attr",freq:24,refs:"Al-Baqarah, An-Nisa, At-Tawbah, An-Nur, Al-Muzzammil"},
  {id:3,ar:"وَاللّٰهُ عَلِيْمٌ حَكِيْمٌ",tr:"Wa-Allāhu 'Alīmun Ḥakīm",en:"And Allah is Knowing, Wise",cat:"attr",freq:10,refs:"Al-Baqarah, An-Nisa, At-Tawbah, Al-Mumtahanah"},
  {id:4,ar:"فَبِاَيِّ اٰلَآءِ رَبِّكُمَا تُكَذِّبٰنِ",tr:"Fabi-ayyi ālā'i Rabbikumā tukadhdhibān",en:"So which of the favors of your Lord would you deny?",cat:"sign",freq:31,refs:"Ar-Rahman (repeated 31 times)"},
  {id:5,ar:"اِنَّ اللّٰهَ عَلٰى كُلِّ شَيْءٍ قَدِيْرٌ",tr:"Inna Allāha 'alā kulli shay'in Qadīr",en:"Indeed, Allah is over all things competent",cat:"attr",freq:12,refs:"Al-Baqarah, Al-Ma'idah, An-Nahl, Al-Ahzab, Fatir"},
  {id:6,ar:"اِنَّ فِيْ ذٰلِكَ لَاٰيٰتٍ لِّقَوْمٍ يَّتَفَكَّرُوْنَ",tr:"Inna fī dhālika la-āyātin li-qawmin yatafakkarūn",en:"Indeed in that are signs for a people who give thought",cat:"sign",freq:5,refs:"Ar-Ra'd, An-Nahl, Ar-Rum, Az-Zumar, Al-Jathiyah"},
  {id:7,ar:"اِنَّ فِيْ ذٰلِكَ لَاٰيٰتٍ لِّقَوْمٍ يُّؤْمِنُوْنَ",tr:"Inna fī dhālika la-āyātin li-qawmin yu'minūn",en:"Indeed in that are signs for a people who believe",cat:"sign",freq:3,refs:"Al-An'am, Ar-Rum, An-Naml"},
  {id:8,ar:"اِنَّ فِيْ ذٰلِكَ لَاٰيٰتٍ لِّقَوْمٍ يَّعْقِلُوْنَ",tr:"Inna fī dhālika la-āyātin li-qawmin ya'qilūn",en:"Indeed in that are signs for a people who reason",cat:"sign",freq:4,refs:"Al-Baqarah, Ar-Ra'd, An-Nahl, Al-Ankabut"},
  {id:9,ar:"وَاللّٰهُ بِكُلِّ شَيْءٍ عَلِيْمٌ",tr:"Wa-Allāhu bi-kulli shay'in 'Alīm",en:"And Allah is Knowing of all things",cat:"attr",freq:8,refs:"Al-Baqarah, An-Nisa, Al-Mujadilah, At-Taghabun"},
  {id:10,ar:"اِنَّ اللّٰهَ سَمِيْعٌ عَلِيْمٌ",tr:"Inna Allāha Samī'un 'Alīm",en:"Indeed, Allah is Hearing, Knowing",cat:"attr",freq:6,refs:"Al-Baqarah, Al-Anfal, Al-Hajj, Luqman"},
  {id:11,ar:"وَيْلٌ يَّوْمَئِذٍ لِّلْمُكَذِّبِيْنَ",tr:"Waylun yawma'idhin lil-mukadhdhibīn",en:"Woe, that Day, to the deniers",cat:"akh",freq:10,refs:"Al-Mursalat (repeated 10 times)"},
  {id:12,ar:"وَاتَّقُوا اللّٰهَ",tr:"Wa-ttaqū Allāh",en:"And fear Allah",cat:"cmd",freq:8,refs:"Al-Baqarah, Al-Imran, Al-Ma'idah, An-Nur, Al-Hashr"},
  {id:13,ar:"اِنَّ اللّٰهَ عَزِيْزٌ حَكِيْمٌ",tr:"Inna Allāha 'Azīzun Ḥakīm",en:"Indeed, Allah is Exalted in Might, Wise",cat:"attr",freq:7,refs:"Al-Baqarah, Al-Anfal, At-Tawbah, Ibrahim, Luqman"},
  {id:14,ar:"لَعَلَّكُمْ تَتَّقُوْنَ",tr:"La'allakum tattaqūn",en:"That you may become righteous",cat:"cmd",freq:3,refs:"Al-Baqarah, Al-A'raf, Al-Mu'minun"},
  {id:15,ar:"وَاللّٰهُ عَلِيْمٌ بِذَاتِ الصُّدُوْرِ",tr:"Wa-Allāhu 'Alīmun bi-dhāti ṣ-ṣudūr",en:"And Allah is Knowing of what is within the breasts",cat:"attr",freq:6,refs:"Al-Imran, Al-Ma'idah, Al-Anfal, Hud, Fatir, Al-Hadid"},
  {id:16,ar:"يٰٓاَيُّهَا الَّذِيْنَ اٰمَنُوْا",tr:"Yā ayyuha-lladhīna āmanū",en:"O you who have believed",cat:"faith",freq:89,refs:"Throughout the Quran — primary mode of address to believers"},
  {id:17,ar:"وَاللّٰهُ غَفُوْرٌ رَّحِيْمٌ",tr:"Wa-Allāhu Ghafūrun Raḥīm",en:"And Allah is Forgiving, Merciful",cat:"attr",freq:14,refs:"Al-Imran, Al-Ma'idah, At-Tawbah, An-Nur, Al-Mumtahanah"},
  {id:18,ar:"اِنَّ اللّٰهَ لَا يُحِبُّ",tr:"Inna Allāha lā yuḥibbu",en:"Indeed, Allah does not love...",cat:"attr",freq:24,refs:"Al-Baqarah, Al-Imran, Al-Ma'idah, Al-Anfal, Luqman"},
  {id:19,ar:"اَفَلَا تَعْقِلُوْنَ",tr:"Afalā ta'qilūn",en:"Then will you not reason?",cat:"sign",freq:13,refs:"Al-Baqarah, Al-Imran, Al-An'am, Al-A'raf, Yusuf"},
  {id:20,ar:"اَفَلَا يَتَدَبَّرُوْنَ",tr:"Afalā yatadabbarūn",en:"Then do they not reflect?",cat:"sign",freq:3,refs:"An-Nisa, Muhammad, Al-Mu'minun"},
  {id:21,ar:"وَمَا اللّٰهُ بِغَافِلٍ عَمَّا تَعْمَلُوْنَ",tr:"Wa mā Allāhu bi-ghāfilin 'ammā ta'malūn",en:"And Allah is not unaware of what you do",cat:"attr",freq:6,refs:"Al-Baqarah, Al-Imran, Hud, An-Naml"},
  {id:22,ar:"وَاِلَى اللّٰهِ الْمَصِيْرُ",tr:"Wa ilā-Allāhi l-maṣīr",en:"And to Allah is the destination",cat:"akh",freq:5,refs:"Al-Imran, Al-Ma'idah, An-Nur, Fatir, Ash-Shura"},
  {id:23,ar:"لَعَلَّكُمْ تُفْلِحُوْنَ",tr:"La'allakum tufliḥūn",en:"That you may succeed",cat:"cmd",freq:5,refs:"Al-Baqarah, Al-Imran, Al-Ma'idah, Al-A'raf, Al-Hajj"},
  {id:24,ar:"اِنَّ اللّٰهَ كَانَ غَفُوْرًا رَّحِيْمًا",tr:"Inna Allāha kāna Ghafūran Raḥīmā",en:"Indeed, Allah is ever Forgiving, Merciful",cat:"attr",freq:5,refs:"An-Nisa, Al-Ahzab, Al-Fath, Al-Furqan"},
  {id:25,ar:"وَاللّٰهُ وَاسِعٌ عَلِيْمٌ",tr:"Wa-Allāhu Wāsi'un 'Alīm",en:"And Allah is all-Encompassing, Knowing",cat:"attr",freq:3,refs:"Al-Baqarah, Al-Imran, An-Nur"},
  {id:26,ar:"اِنَّ اللّٰهَ كَانَ عَلِيْمًا حَكِيْمًا",tr:"Inna Allāha kāna 'Alīman Ḥakīmā",en:"Indeed, Allah is ever Knowing, Wise",cat:"attr",freq:4,refs:"An-Nisa, Al-Ahzab, Al-Insan, Al-Fath"},
  {id:27,ar:"وَاللّٰهُ يَعْلَمُ وَاَنْتُمْ لَا تَعْلَمُوْنَ",tr:"Wa-Allāhu ya'lamu wa antum lā ta'lamūn",en:"And Allah knows while you know not",cat:"attr",freq:4,refs:"Al-Baqarah, Al-Imran, An-Nur, Al-Hujurat"},
  {id:28,ar:"قُلْ هُوَ اللّٰهُ اَحَدٌ",tr:"Qul huwa-Allāhu Aḥad",en:"Say: He is Allah, the One",cat:"faith",freq:1,refs:"Al-Ikhlas"},
  {id:29,ar:"سُبْحٰنَ اللّٰهِ",tr:"Subḥāna-Allāh",en:"Glory be to Allah",cat:"dua",freq:7,refs:"Yusuf, An-Nur, Al-Hadid, Al-Hashr, As-Saff"},
  {id:30,ar:"اَلْحَمْدُ لِلّٰهِ رَبِّ الْعٰلَمِيْنَ",tr:"Al-ḥamdu lillāhi Rabbi l-'ālamīn",en:"All praise is due to Allah, Lord of the worlds",cat:"dua",freq:4,refs:"Al-Fatihah, Al-An'am, As-Saffat, Az-Zumar"},
  {id:31,ar:"خٰلِدِيْنَ فِيْهَا اَبَدًا",tr:"Khālidīna fīhā abadā",en:"Abiding therein forever",cat:"akh",freq:8,refs:"An-Nisa, Al-Ma'idah, At-Tawbah, Al-Kahf, Al-Ahzab"},
  {id:32,ar:"تَجْرِيْ مِنْ تَحْتِهَا الْاَنْهٰرُ",tr:"Tajrī min taḥtiha l-anhār",en:"Beneath which rivers flow",cat:"akh",freq:12,refs:"Al-Baqarah, Al-Imran, An-Nisa, Al-Ma'idah, At-Tawbah"},
  {id:33,ar:"مِنْ دُوْنِ اللّٰهِ",tr:"Min dūni-Allāh",en:"Other than Allah / besides Allah",cat:"faith",freq:25,refs:"Throughout — contrasting true worship with idolatry"},
  {id:34,ar:"اِنَّ اللّٰهَ كَانَ عَلِيًّا كَبِيْرًا",tr:"Inna Allāha kāna 'Aliyyan Kabīrā",en:"Indeed, Allah is ever High, Grand",cat:"attr",freq:2,refs:"An-Nisa, Luqman"},
  {id:35,ar:"وَتُوْبُوْٓا اِلَى اللّٰهِ",tr:"Wa tūbū ilā-Allāh",en:"And turn to Allah in repentance",cat:"cmd",freq:2,refs:"An-Nur, At-Tahrim"},
  {id:36,ar:"فَاتَّقُوا اللّٰهَ وَاَطِيْعُوْنِ",tr:"Fa-ttaqū Allāha wa aṭī'ūn",en:"So fear Allah and obey me",cat:"proph",freq:6,refs:"Ash-Shu'ara (Nuh, Hud, Salih, Lut, Shu'ayb, Musa)"},
  {id:37,ar:"اِنِّيْ لَكُمْ رَسُوْلٌ اَمِيْنٌ",tr:"Innī lakum rasūlun amīn",en:"Indeed, I am to you a trustworthy messenger",cat:"proph",freq:5,refs:"Ash-Shu'ara (Nuh, Hud, Salih, Lut, Shu'ayb)"},
  {id:38,ar:"وَمَآ اَرْسَلْنٰكَ اِلَّا رَحْمَةً لِّلْعٰلَمِيْنَ",tr:"Wa mā arsalnāka illā raḥmatan lil-'ālamīn",en:"And We have not sent you except as a mercy to the worlds",cat:"proph",freq:1,refs:"Al-Anbiya"},
  {id:39,ar:"كَذٰلِكَ يُبَيِّنُ اللّٰهُ لَكُمْ اٰيٰتِهٖ",tr:"Kadhālika yubayyinu Allāhu lakum āyātih",en:"Thus does Allah make clear to you His verses",cat:"sign",freq:4,refs:"Al-Baqarah, Al-Imran, An-Nur, Al-Hadid"},
  {id:40,ar:"اُولٰٓئِكَ اَصْحٰبُ النَّارِ هُمْ فِيْهَا خٰلِدُوْنَ",tr:"Ulā'ika aṣḥābu n-nār hum fīhā khālidūn",en:"Those are the companions of the Fire; they abide therein eternally",cat:"akh",freq:6,refs:"Al-Baqarah, Al-A'raf, Yunus, Ar-Ra'd"},
  {id:41,ar:"وَاللّٰهُ لَا يُحِبُّ الظّٰلِمِيْنَ",tr:"Wa-Allāhu lā yuḥibbu ẓ-ẓālimīn",en:"And Allah does not love the wrongdoers",cat:"attr",freq:3,refs:"Al-Imran, Ash-Shura"},
  {id:42,ar:"اِنَّ اللّٰهَ يُحِبُّ الْمُحْسِنِيْنَ",tr:"Inna Allāha yuḥibbu l-muḥsinīn",en:"Indeed, Allah loves the doers of good",cat:"attr",freq:3,refs:"Al-Baqarah, Al-Imran, Al-Ma'idah"},
  {id:43,ar:"ذٰلِكَ بِاَنَّهُمْ كَانُوْا يَكْفُرُوْنَ",tr:"Dhālika bi-annahum kānū yakfurūn",en:"That is because they used to disbelieve",cat:"akh",freq:3,refs:"Al-A'raf, Az-Zukhruf, Al-Ahqaf"},
  {id:44,ar:"اِنَّ فِيْ ذٰلِكَ لَاٰيَةً",tr:"Inna fī dhālika la-āyah",en:"Indeed in that is a sign",cat:"sign",freq:8,refs:"Al-Baqarah, Al-Imran, An-Nahl, Ash-Shu'ara, Al-Ankabut"},
  {id:45,ar:"وَمَنْ يُّؤْمِنْ بِاللّٰهِ وَالْيَوْمِ الْاٰخِرِ",tr:"Wa man yu'min billāhi wa l-yawmi l-ākhir",en:"And whoever believes in Allah and the Last Day",cat:"faith",freq:6,refs:"Al-Baqarah, An-Nisa, Al-Ma'idah, At-Tawbah"},
  {id:46,ar:"اِنَّ اللّٰهَ كَانَ سَمِيْعًا بَصِيْرًا",tr:"Inna Allāha kāna Samī'an Baṣīrā",en:"Indeed, Allah is ever Hearing, Seeing",cat:"attr",freq:4,refs:"An-Nisa, Al-Hajj, Luqman, Al-Mujadilah"},
  {id:47,ar:"وَسَبِّحْ بِحَمْدِ رَبِّكَ",tr:"Wa sabbiḥ bi-ḥamdi Rabbik",en:"And exalt with praise of your Lord",cat:"cmd",freq:5,refs:"Ta-Ha, Qaf, At-Tur, Al-Insan, An-Nasr"},
  {id:48,ar:"كَذٰلِكَ نُفَصِّلُ الْاٰيٰتِ لِقَوْمٍ يَّعْلَمُوْنَ",tr:"Kadhālika nufaṣṣilu l-āyāti li-qawmin ya'lamūn",en:"Thus We detail the signs for a people who know",cat:"sign",freq:4,refs:"Al-A'raf, Yunus, Al-Fussilat, Al-Jathiyah"},
  {id:49,ar:"اِنَّ اللّٰهَ لَا يَهْدِي الْقَوْمَ الظّٰلِمِيْنَ",tr:"Inna Allāha lā yahdī l-qawma ẓ-ẓālimīn",en:"Indeed, Allah does not guide the wrongdoing people",cat:"attr",freq:4,refs:"Al-Baqarah, Al-An'am, At-Tawbah, Al-Qasas"},
  {id:50,ar:"رَبَّنَا لَا تُؤَاخِذْنَآ اِنْ نَّسِيْنَآ اَوْ اَخْطَأْنَا",tr:"Rabbanā lā tu'ākhidhnā in nasīnā aw akhṭa'nā",en:"Our Lord, do not impose blame upon us if we forget or err",cat:"dua",freq:1,refs:"Al-Baqarah"},
  {id:51,ar:"اِنَّ اللّٰهَ كَانَ تَوَّابًا رَّحِيْمًا",tr:"Inna Allāha kāna Tawwāban Raḥīmā",en:"Indeed, Allah is ever Accepting of repentance, Merciful",cat:"attr",freq:3,refs:"An-Nisa, At-Tawbah, Al-Furqan"},
  {id:52,ar:"وَاللّٰهُ عَلٰى كُلِّ شَيْءٍ قَدِيْرٌ",tr:"Wa-Allāhu 'alā kulli shay'in Qadīr",en:"And Allah is over all things competent",cat:"attr",freq:6,refs:"Al-Ma'idah, Hud, Ar-Ra'd, An-Nahl, Fatir"},
  {id:53,ar:"اِنَّا كَذٰلِكَ نَجْزِي الْمُحْسِنِيْنَ",tr:"Innā kadhālika najzī l-muḥsinīn",en:"Indeed, We thus reward the doers of good",cat:"akh",freq:3,refs:"As-Saffat, Ad-Dukhan, Al-Mursalat"},
  {id:54,ar:"وَمَا يَعْلَمُ جُنُوْدَ رَبِّكَ اِلَّا هُوَ",tr:"Wa mā ya'lamu junūda Rabbika illā Huwa",en:"And none knows the soldiers of your Lord except Him",cat:"attr",freq:1,refs:"Al-Muddathir"},
  {id:55,ar:"فَاذْكُرُوْنِيْ اَذْكُرْكُمْ",tr:"Fa-dhkurūnī adhkurkum",en:"So remember Me; I will remember you",cat:"cmd",freq:1,refs:"Al-Baqarah"},
  {id:56,ar:"وَاللّٰهُ يَرْزُقُ مَنْ يَّشَآءُ بِغَيْرِ حِسَابٍ",tr:"Wa-Allāhu yarzuqu man yashā'u bi-ghayri ḥisāb",en:"And Allah provides for whom He wills without account",cat:"attr",freq:3,refs:"Al-Baqarah, Al-Imran, An-Nur"},
  {id:57,ar:"وَاللّٰهُ لَا يُحِبُّ كُلَّ مُخْتَالٍ فَخُوْرٍ",tr:"Wa-Allāhu lā yuḥibbu kulla mukhtālin fakhūr",en:"And Allah does not like every self-deluded boaster",cat:"attr",freq:2,refs:"An-Nisa, Luqman"},
  {id:58,ar:"اَلَمْ تَرَ اِلَى الَّذِيْنَ",tr:"Alam tara ila-lladhīna",en:"Have you not seen those who...",cat:"sign",freq:20,refs:"Al-Baqarah, Al-Imran, An-Nisa (frequent Quranic opener)"},
  {id:59,ar:"كُنْتُمْ خَيْرَ اُمَّةٍ اُخْرِجَتْ لِلنَّاسِ",tr:"Kuntum khayra ummatin ukhrijat lin-nās",en:"You are the best nation produced for mankind",cat:"faith",freq:1,refs:"Al-Imran"},
  {id:60,ar:"وَهُوَ الْعَزِيْزُ الْحَكِيْمُ",tr:"Wa huwa l-'Azīzu l-Ḥakīm",en:"And He is the Exalted in Might, the Wise",cat:"attr",freq:8,refs:"Al-Baqarah, Al-Imran, Ibrahim, An-Nahl, Luqman, Al-Ahqaf"},
  {id:61,ar:"وَهُوَ السَّمِيْعُ الْعَلِيْمُ",tr:"Wa huwa s-Samī'u l-'Alīm",en:"And He is the Hearing, the Knowing",cat:"attr",freq:4,refs:"Al-Baqarah, Al-An'am, Al-Anbiya, Ash-Shu'ara"},
  {id:62,ar:"وَاللّٰهُ خَبِيْرٌ بِمَا تَعْمَلُوْنَ",tr:"Wa-Allāhu Khabīrun bimā ta'malūn",en:"And Allah is Acquainted with what you do",cat:"attr",freq:5,refs:"Al-Imran, An-Nur, Al-Hadid, Al-Mujadilah"},
  {id:63,ar:"اِنَّ اللّٰهَ لَا يَهْدِي الْقَوْمَ الْكٰفِرِيْنَ",tr:"Inna Allāha lā yahdī l-qawma l-kāfirīn",en:"Indeed, Allah does not guide the disbelieving people",cat:"attr",freq:3,refs:"Al-Baqarah, Al-Ma'idah, At-Tawbah"},
  {id:64,ar:"اِنَّ اللّٰهَ لَا يَهْدِي الْقَوْمَ الْفٰسِقِيْنَ",tr:"Inna Allāha lā yahdī l-qawma l-fāsiqīn",en:"Indeed, Allah does not guide the defiantly disobedient",cat:"attr",freq:4,refs:"Al-Ma'idah, At-Tawbah, As-Saff, Al-Munafiqun"},
  {id:65,ar:"وَاللّٰهُ عَلٰى كُلِّ شَيْءٍ شَهِيْدٌ",tr:"Wa-Allāhu 'alā kulli shay'in Shahīd",en:"And Allah is, over all things, Witness",cat:"attr",freq:4,refs:"An-Nisa, Al-Ma'idah, Al-Hajj, Saba"},
  {id:66,ar:"وَلَقَدْ اٰتَيْنَا مُوْسَى الْكِتٰبَ",tr:"Wa laqad ātaynā Mūsā l-Kitāb",en:"And We had certainly given Moses the Scripture",cat:"proph",freq:4,refs:"Al-Baqarah, Al-An'am, Hud, Al-Mu'minun"},
  {id:67,ar:"اِنَّ رَبَّكَ هُوَ الْعَزِيْزُ الرَّحِيْمُ",tr:"Inna Rabbaka huwa l-'Azīzu r-Raḥīm",en:"Indeed, your Lord - He is the Exalted in Might, the Merciful",cat:"attr",freq:7,refs:"Ash-Shu'ara (repeated for each prophet's story)"},
  {id:68,ar:"اِنَّ اللّٰهَ لَا يُحِبُّ الْمُعْتَدِيْنَ",tr:"Inna Allāha lā yuḥibbu l-mu'tadīn",en:"Indeed, Allah does not like transgressors",cat:"attr",freq:2,refs:"Al-Baqarah, Al-Ma'idah"},
  {id:69,ar:"اِنَّ اللّٰهَ يُحِبُّ الْمُتَّقِيْنَ",tr:"Inna Allāha yuḥibbu l-muttaqīn",en:"Indeed, Allah loves the righteous",cat:"attr",freq:2,refs:"Al-Imran, At-Tawbah"},
  {id:70,ar:"اِنَّ اللّٰهَ كَانَ عَلِيْمًا خَبِيْرًا",tr:"Inna Allāha kāna 'Alīman Khabīrā",en:"Indeed, Allah is ever Knowing, Acquainted",cat:"attr",freq:3,refs:"An-Nisa, Al-Ahzab, Fatir"},
  {id:71,ar:"وَهُوَ الْغَفُوْرُ الرَّحِيْمُ",tr:"Wa huwa l-Ghafūru r-Raḥīm",en:"And He is the Forgiving, the Merciful",cat:"attr",freq:5,refs:"Al-An'am, Yunus, Yusuf, Az-Zumar"},
  {id:72,ar:"لَا اِلٰهَ اِلَّا هُوَ",tr:"Lā ilāha illā Huwa",en:"There is no deity except Him",cat:"faith",freq:11,refs:"Al-Baqarah, Al-Imran, An-Nisa, Al-An'am, and others"},
  {id:73,ar:"اِنَّا كَذٰلِكَ نَجْزِي الْمُتَّقِيْنَ",tr:"Innā kadhālika najzī l-muttaqīn",en:"Indeed, We thus reward the righteous",cat:"akh",freq:2,refs:"As-Saffat, Ad-Dukhan"},

function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) { var j = Math.floor(Math.random() * (i + 1)); var t = a[i]; a[i] = a[j]; a[j] = t; }
  return a;
}

function genOptions(correct, pool, reverse) {
  var wrong = pool.filter(function(p) { return p.id !== correct.id; });
  var picked = shuffle(wrong).slice(0, 3);
  var opts = picked.map(function(p) { return { id: p.id, ar: p.ar, en: p.en, correct: false }; });
  opts.push({ id: correct.id, ar: correct.ar, en: correct.en, correct: true });
  return shuffle(opts);
}

function getDailyPhrase() {

  return PHRASES[seed % PHRASES.length];
}


function filterByCategories(phrases, cats) {
  if (!cats || cats.length === 0) return phrases;

          BookmarkI(marked.has(mcCard.id)), marked.has(mcCard.id) ? " Marked" : " Mark"
        ),
        mcUnanswered > 0 && mcUnanswered < mcDeck.length
          ? e("button", { className: "mark-btn", onClick: mcGoUnanswered }, "Unanswered (" + mcUnanswered + ")")
          : null
      ),
      e("div", { style: { display: "flex", justifyContent: "center", gap: "12px", flexWrap: "wrap" } },
        e("button", { className: "nav-btn", onClick: mcGoPrev, disabled: mcIdx === 0 }, ChevL(), " Prev"),
        mcIdx < mcDeck.length - 1
          ? e("button", { className: "nav-btn", onClick: mcGoNext }, "Next ", ChevR())
          : null,
        mcUnanswered === 0 || mcIdx === mcDeck.length - 1
          ? e("button", { className: "nav-btn mc-finish-btn", onClick: mcEndSession }, "Finish ", CheckI())
          : null
      )
    ) : null,
    renderModal(),
    toast ? e("div", { className: "toast", key: toast }, toast) : null
  );
}

ReactDOM.render(e(App), document.getElementById("root"));

</script>
</body>
</html>
