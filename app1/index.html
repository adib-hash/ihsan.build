<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Quran Phrases">
<meta name="theme-color" content="#0C1B0E">
<title>Qur'anic Phrases — Flashcards</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body, #root { height: 100%; overflow: hidden; }
  body { background: #0C1B0E; }

  .app {
    min-height: 100vh; min-height: 100dvh;
    background: linear-gradient(170deg, #0C1B0E 0%, #1A2F1C 40%, #0F1F12 100%);
    font-family: 'Cormorant Garamond', Georgia, serif;
    color: #E8E0D4;
    display: flex; flex-direction: column;
    overflow: hidden; position: relative;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
  }

  /* Header */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 20px 12px;
    border-bottom: 1px solid rgba(212,168,84,0.12);
    flex-shrink: 0;
  }
  .header-title {
    font-size: 15px; letter-spacing: 0.2em; text-transform: uppercase;
    color: rgba(212,168,84,0.7); font-weight: 400;
  }
  .header-btn {
    background: none; border: 1px solid rgba(212,168,84,0.25);
    color: rgba(212,168,84,0.7); font-family: inherit;
    font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase;
    padding: 6px 12px; border-radius: 3px; cursor: pointer;
    transition: all 0.2s;
  }
  .header-btn:hover { border-color: rgba(212,168,84,0.6); color: rgba(212,168,84,1); }
  .header-btn.active { background: rgba(212,168,84,0.15); border-color: rgba(212,168,84,0.5); color: #D4A854; }
  .badge {
    display: inline-block; background: #D4A854; color: #0C1B0E;
    font-size: 10px; font-weight: 700; border-radius: 10px;
    padding: 1px 6px; margin-left: 5px; vertical-align: middle;
  }

  /* Progress */
  .progress-wrap { padding: 10px 20px 6px; flex-shrink: 0; }
  .progress-track {
    height: 2px; background: rgba(212,168,84,0.1); border-radius: 1px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; background: linear-gradient(90deg, rgba(212,168,84,0.4), rgba(212,168,84,0.8));
    border-radius: 1px; transition: width 0.4s ease;
  }
  .progress-label {
    text-align: center; margin-top: 6px;
    font-size: 11px; color: rgba(212,168,84,0.3); letter-spacing: 0.2em;
  }

  /* Card area */
  .card-area {
    flex: 1; display: flex; align-items: center; justify-content: center;
    padding: 12px 20px; overflow: hidden;
  }
  .card-wrapper { perspective: 1200px; width: 100%; max-width: 420px; }
  .card-inner {
    position: relative; width: 100%;
    transform-style: preserve-3d;
    transition: transform 0.55s cubic-bezier(0.23, 1, 0.32, 1);
    cursor: pointer;
  }
  .card-inner.flipped { transform: rotateY(180deg); }

  .card-face {
    width: 100%;
    backface-visibility: hidden; -webkit-backface-visibility: hidden;
    background: linear-gradient(145deg, #1C2F1E 0%, #162518 50%, #1A2C1C 100%);
    border: 1px solid rgba(212,168,84,0.18);
    border-radius: 12px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.03), inset 0 1px 0 rgba(255,255,255,0.05);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 260px; padding: 32px 28px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .card-face::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    background: radial-gradient(ellipse at 30% 20%, rgba(212,168,84,0.04) 0%, transparent 60%);
    pointer-events: none;
  }
  .card-back {
    position: absolute; top: 0; left: 0;
    transform: rotateY(180deg);
  }

  .card-hint {
    position: absolute; bottom: 12px; left: 0; right: 0;
    text-align: center; font-size: 11px; letter-spacing: 0.15em;
    color: rgba(212,168,84,0.25); text-transform: uppercase;
  }
  .card-label {
    font-size: 10px; letter-spacing: 0.25em; text-transform: uppercase;
    color: rgba(212,168,84,0.35); margin-bottom: 20px;
  }
  .arabic-text {
    font-family: 'Amiri', serif; font-size: 32px; line-height: 1.7;
    color: #F5EDE0; direction: rtl; margin-bottom: 20px;
    text-shadow: 0 1px 8px rgba(212,168,84,0.15);
  }
  .transliteration {
    font-family: 'Cormorant Garamond', serif; font-style: italic;
    font-size: 15px; line-height: 1.6; color: rgba(212,168,84,0.65);
    letter-spacing: 0.03em;
  }
  .translation {
    font-family: 'Cormorant Garamond', serif; font-size: 19px;
    line-height: 1.65; color: #E8E0D4; font-weight: 400;
    font-style: italic;
  }

  /* Bottom controls */
  .controls { padding: 10px 20px 24px; flex-shrink: 0; }
  .mark-row { display: flex; justify-content: center; margin-bottom: 14px; }
  .mark-btn {
    display: flex; align-items: center; gap: 7px;
    background: none; border: 1px solid rgba(212,168,84,0.2);
    color: rgba(212,168,84,0.55); font-family: inherit;
    font-size: 13px; letter-spacing: 0.1em; text-transform: uppercase;
    padding: 9px 20px; border-radius: 4px; cursor: pointer;
    transition: all 0.25s;
  }
  .mark-btn:hover { border-color: rgba(212,168,84,0.5); color: #D4A854; }
  .mark-btn.active {
    background: rgba(212,168,84,0.12); border-color: rgba(212,168,84,0.5);
    color: #D4A854;
  }
  .nav-row { display: flex; justify-content: center; gap: 12px; }
  .nav-btn {
    display: flex; align-items: center; gap: 5px;
    background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08);
    color: rgba(232,224,212,0.55); font-family: inherit;
    font-size: 13px; letter-spacing: 0.08em;
    padding: 10px 22px; border-radius: 4px; cursor: pointer;
    transition: all 0.2s; flex: 1; max-width: 140px; justify-content: center;
  }
  .nav-btn:hover:not(:disabled) { background: rgba(255,255,255,0.06); color: #E8E0D4; border-color: rgba(255,255,255,0.15); }
  .nav-btn:disabled { opacity: 0.25; cursor: not-allowed; }

  /* Review empty state */
  .empty-state {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 220px; text-align: center; padding: 20px;
  }
  .empty-icon { font-size: 44px; opacity: 0.25; margin-bottom: 14px; }
  .empty-title { font-size: 18px; color: rgba(245,237,224,0.45); margin-bottom: 6px; }
  .empty-sub { font-size: 13px; color: rgba(212,168,84,0.3); line-height: 1.5; }

  /* Reshuffle btn */
  .reshuffle-btn {
    background: none; border: none; color: rgba(212,168,84,0.4);
    cursor: pointer; padding: 4px; display: flex; align-items: center;
    transition: color 0.2s;
  }
  .reshuffle-btn:hover { color: rgba(212,168,84,0.8); }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script>
const { useState, useEffect, useRef, useCallback } = React;
const e = React.createElement;

const STORAGE_KEY = "quran_flashcards_marked_v2";

const PHRASES = [
  { id: 1, ar: "بِسْمِ اللّٰهِ الرَّحْمٰنِ الرَّحِيْمِ", tr: "Bismillāhi r-Raḥmāni r-Raḥīm", en: "In the name of Allah, the Most Gracious, the Most Merciful" },
  { id: 2, ar: "اِنَّ اللّٰهَ غَفُوْرٌ رَّحِيْمٌ", tr: "Inna Allāha Ghafūrun Raḥīm", en: "Indeed, Allah is Forgiving, Merciful" },
  { id: 3, ar: "وَاللّٰهُ عَلِيْمٌ حَكِيْمٌ", tr: "Wa-Allāhu ʿAlīmun Ḥakīm", en: "And Allah is Knowing, Wise" },
  { id: 4, ar: "فَبِاَيِّ اٰلَآءِ رَبِّكُمَا تُكَذِّبٰنِ", tr: "Fabi-ayyi ālāʾi Rabbikumā tukadhdhibān", en: "So which of the favors of your Lord would you deny?" },
  { id: 5, ar: "اِنَّا لِلّٰهِ وَاِنَّآ اِلَيْهِ رَاجِعُوْنَ", tr: "Innā lillāhi wa-innā ilayhi rājiʿūn", en: "Indeed we belong to Allah and to Him we shall return" },
  { id: 6, ar: "لَا اِلٰهَ اِلَّا اللّٰهُ", tr: "Lā ilāha illā Allāh", en: "There is no god but Allah" },
  { id: 7, ar: "سُبْحَانَ اللّٰهِ وَبِحَمْدِهِ", tr: "Subḥāna Allāhi wa-biḥamdih", en: "Glory be to Allah and praise be to Him" },
  { id: 8, ar: "اِنَّ اللّٰهَ عَلٰى كُلِّ شَيْءٍ قَدِيْرٌ", tr: "Inna Allāha ʿalā kulli shayʾin Qadīr", en: "Indeed, Allah has power over all things" },
  { id: 9, ar: "وَهُوَ بِكُلِّ شَيْءٍ عَلِيْمٌ", tr: "Wa-huwa bi-kulli shayʾin ʿAlīm", en: "And He has knowledge of all things" },
  { id: 10, ar: "حَسْبُنَا اللّٰهُ وَنِعْمَ الْوَكِيْلُ", tr: "Ḥasbunā Allāhu wa-niʿma l-Wakīl", en: "Allah is sufficient for us, and He is the best Disposer of affairs" },
  { id: 11, ar: "اَللّٰهُ لَا اِلٰهَ اِلَّا هُوَ الْحَيُّ الْقَيُّوْمُ", tr: "Allāhu lā ilāha illā Huwa l-Ḥayyu l-Qayyūm", en: "Allah — there is no god but Him, the Ever-Living, the Self-Sustaining" },
  { id: 12, ar: "يٰٓاَيُّهَا الَّذِيْنَ اٰمَنُوْا", tr: "Yā ayyuhā lladhīna āmanū", en: "O you who have believed" },
  { id: 13, ar: "اِنَّ اللّٰهَ مَعَ الصَّابِرِيْنَ", tr: "Inna Allāha maʿa ṣ-ṣābirīn", en: "Indeed, Allah is with the patient" },
  { id: 14, ar: "وَاللّٰهُ غَفُوْرٌ رَّحِيْمٌ", tr: "Wa-Allāhu Ghafūrun Raḥīm", en: "And Allah is Forgiving, Merciful" },
  { id: 15, ar: "رَبَّنَا تَقَبَّلْ مِنَّا", tr: "Rabbanā taqabbal minnā", en: "Our Lord, accept from us" },
  { id: 16, ar: "رَبَّنَآ اٰتِنَا فِى الدُّنْيَا حَسَنَةً", tr: "Rabbanā ātinā fi d-dunyā ḥasanatan", en: "Our Lord, give us good in this world" },
  { id: 17, ar: "اِنَّ اللّٰهَ سَمِيْعٌ عَلِيْمٌ", tr: "Inna Allāha Samīʿun ʿAlīm", en: "Indeed, Allah is Hearing and Knowing" },
  { id: 18, ar: "وَعَسٰٓى اَنْ تَكْرَهُوْا شَيْـًٔا وَّهُوَ خَيْرٌ لَّكُمْ", tr: "Wa-ʿasā an takrahū shayʾan wa-huwa khayrun lakum", en: "Perhaps you dislike something which is good for you" },
  { id: 19, ar: "اِنَّ مَعَ الْعُسْرِ يُسْرًا", tr: "Inna maʿa l-ʿusri yusrā", en: "Indeed, with hardship comes ease" },
  { id: 20, ar: "وَمَنْ يَّتَوَكَّلْ عَلَى اللّٰهِ فَهُوَ حَسْبُهُ", tr: "Wa-man yatawakkal ʿalā Allāhi fa-huwa ḥasbuh", en: "And whoever relies upon Allah — He is sufficient for him" },
  { id: 21, ar: "يُرِيْدُ اللّٰهُ بِكُمُ الْيُسْرَ وَلَا يُرِيْدُ بِكُمُ الْعُسْرَ", tr: "Yurīdu Allāhu bikumu l-yusra wa-lā yurīdu bikumu l-ʿusr", en: "Allah intends ease for you and does not intend hardship for you" },
  { id: 22, ar: "وَاذْكُرُوا اللّٰهَ كَثِيْرًا لَّعَلَّكُمْ تُفْلِحُوْنَ", tr: "Wa-dhkurū Allāha kathīran laʿallakum tufliḥūn", en: "Remember Allah often so that you may succeed" },
  { id: 23, ar: "اِنَّمَا الْمُؤْمِنُوْنَ اِخْوَةٌ", tr: "Innamā l-muʾminūna ikhwah", en: "The believers are but brothers" },
  { id: 24, ar: "وَاللّٰهُ يُحِبُّ الْمُحْسِنِيْنَ", tr: "Wa-Allāhu yuḥibbu l-muḥsinīn", en: "And Allah loves the doers of good" },
  { id: 25, ar: "اِنَّ اللّٰهَ يُحِبُّ التَّوَّابِيْنَ", tr: "Inna Allāha yuḥibbu t-tawwābīn", en: "Indeed, Allah loves those who repent" },
  { id: 26, ar: "فَاِنَّ مَعَ الْعُسْرِ يُسْرًا", tr: "Fa-inna maʿa l-ʿusri yusrā", en: "So indeed, with hardship will be ease" },
  { id: 27, ar: "وَمَا تَوْفِيْقِيْٓ اِلَّا بِاللّٰهِ", tr: "Wa-mā tawfīqī illā billāh", en: "And my success is not but through Allah" },
  { id: 28, ar: "اِنَّ اللّٰهَ لَا يُضِيْعُ اَجْرَ الْمُحْسِنِيْنَ", tr: "Inna Allāha lā yudīʿu ajra l-muḥsinīn", en: "Indeed, Allah does not waste the reward of the doers of good" },
  { id: 29, ar: "رَبِّ اشْرَحْ لِيْ صَدْرِيْ", tr: "Rabbi shraḥ lī ṣadrī", en: "My Lord, expand for me my chest" },
  { id: 30, ar: "وَاللّٰهُ خَيْرُ الرَّازِقِيْنَ", tr: "Wa-Allāhu khayru r-rāziqīn", en: "And Allah is the best of providers" },
];

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// SVG icons
function BookmarkSvg(filled) {
  return e("svg", { width: 16, height: 16, viewBox: "0 0 24 24", fill: filled ? "currentColor" : "none", stroke: "currentColor", strokeWidth: 2 },
    e("path", { d: "M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z" })
  );
}
function ChevLeft() {
  return e("svg", { width: 14, height: 14, viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: 2 },
    e("polyline", { points: "15 18 9 12 15 6" })
  );
}
function ChevRight() {
  return e("svg", { width: 14, height: 14, viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: 2 },
    e("polyline", { points: "9 18 15 12 9 6" })
  );
}
function ReshuffleSvg() {
  return e("svg", { width: 16, height: 16, viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: 2 },
    e("polyline", { points: "17 1 21 5 17 9" }),
    e("path", { d: "M3 11V9a4 4 0 0 1 4-4h14" }),
    e("polyline", { points: "7 23 3 19 7 15" }),
    e("path", { d: "M21 13v2a4 4 0 0 1-4 4H3" })
  );
}

function Card({ card, flipped, onFlip, animKey }) {
  return e("div", { className: "card-wrapper" },
    e("div", { className: "card-inner" + (flipped ? " flipped" : ""), onClick: onFlip, key: animKey },
      // Front
      e("div", { className: "card-face" },
        e("div", { className: "card-label" }, "Tap to reveal translation"),
        e("div", { className: "arabic-text" }, card.ar),
        e("div", { className: "transliteration" }, card.tr),
        e("div", { className: "card-hint" }, "tap to flip")
      ),
      // Back
      e("div", { className: "card-face card-back" },
        e("div", { className: "card-label" }, "Translation"),
        e("div", { className: "translation" }, card.en)
      )
    )
  );
}

function App() {
  const [deck, setDeck] = useState(() => shuffle(PHRASES));
  const [index, setIndex] = useState(0);
  const [flipped, setFlipped] = useState(false);
  const [marked, setMarked] = useState(() => {
    try { return new Set(JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]")); }
    catch { return new Set(); }
  });
  const [view, setView] = useState("study"); // "study" | "review"
  const [reviewDeck, setReviewDeck] = useState([]);
  const [reviewIndex, setReviewIndex] = useState(0);
  const [reviewFlipped, setReviewFlipped] = useState(false);
  const touchStart = useRef(null);

  // Persist marked
  useEffect(() => {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify([...marked])); }
    catch {}
  }, [marked]);

  // Build review deck when entering review mode
  function openReview() {
    const rd = PHRASES.filter(p => marked.has(p.id));
    setReviewDeck(rd);
    setReviewIndex(0);
    setReviewFlipped(false);
    setView("review");
  }
  function closeReview() {
    setView("study");
  }

  const isReview = view === "review";
  const cDeck = isReview ? reviewDeck : deck;
  const cIdx = isReview ? reviewIndex : index;
  const cFlip = isReview ? reviewFlipped : flipped;
  const setCIdx = isReview ? setReviewIndex : setIndex;
  const setCFlip = isReview ? setReviewFlipped : setFlipped;
  const card = cDeck[cIdx] || null;

  function goPrev() {
    if (cIdx > 0) { setCIdx(i => i - 1); setCFlip(false); }
  }
  function goNext() {
    if (cIdx < cDeck.length - 1) { setCIdx(i => i + 1); setCFlip(false); }
  }
  function toggleMark() {
    if (!card) return;
    setMarked(prev => {
      const next = new Set(prev);
      next.has(card.id) ? next.delete(card.id) : next.add(card.id);
      return next;
    });
  }
  function reshuffle() {
    setDeck(shuffle(PHRASES));
    setIndex(0);
    setFlipped(false);
  }

  // Swipe
  function onTouchStart(evt) { touchStart.current = evt.touches[0].clientX; }
  function onTouchEnd(evt) {
    if (touchStart.current === null) return;
    const diff = touchStart.current - evt.changedTouches[0].clientX;
    touchStart.current = null;
    if (Math.abs(diff) < 40) return;
    diff > 0 ? goNext() : goPrev();
  }

  // Keyboard
  useEffect(() => {
    function onKey(e) {
      if (e.key === "ArrowRight") goNext();
      else if (e.key === "ArrowLeft") goPrev();
      else if (e.key === " ") { e.preventDefault(); setCFlip(f => !f); }
    }
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  });

  return e("div", { className: "app" },
    // Header
    e("div", { className: "header" },
      !isReview
        ? e("button", { className: "reshuffle-btn", onClick: reshuffle, title: "Reshuffle deck" }, ReshuffleSvg())
        : e("button", { className: "header-btn", onClick: closeReview }, "← Study"),
      e("div", { className: "header-title" }, isReview ? "Marked for Review" : "Qurʾānic Phrases"),
      !isReview
        ? e("button", {
            className: "header-btn" + (marked.size > 0 ? " active" : ""),
            onClick: openReview
          },
          "Review",
          marked.size > 0 ? e("span", { className: "badge" }, marked.size) : null
        )
        : e("button", {
            className: "header-btn",
            style: { color: "rgba(212,168,84,0.4)", fontSize: "11px" },
            onClick: () => { setMarked(new Set()); setReviewDeck([]); }
          }, "Clear All")
    ),

    // Progress
    cDeck.length > 0
      ? e("div", { className: "progress-wrap" },
          e("div", { className: "progress-track" },
            e("div", { className: "progress-fill", style: { width: ((cIdx + 1) / cDeck.length * 100) + "%" } })
          ),
          e("div", { className: "progress-label" }, (cIdx + 1) + " / " + cDeck.length)
        )
      : null,

    // Main card area
    e("div", { className: "card-area", onTouchStart: onTouchStart, onTouchEnd: onTouchEnd },
      isReview && reviewDeck.length === 0
        ? e("div", { className: "empty-state" },
            e("div", { className: "empty-icon" }, "☽"),
            e("div", { className: "empty-title" }, "No phrases marked yet"),
            e("div", { className: "empty-sub" }, "Tap the bookmark icon while studying\nto add phrases here")
          )
        : card
          ? e(Card, { card, flipped: cFlip, onFlip: () => setCFlip(f => !f), animKey: view + "-" + cIdx })
          : null
    ),

    // Controls
    cDeck.length > 0 && card
      ? e("div", { className: "controls" },
          e("div", { className: "mark-row" },
            e("button", { className: "mark-btn" + (marked.has(card.id) ? " active" : ""), onClick: toggleMark },
              BookmarkSvg(marked.has(card.id)),
              marked.has(card.id) ? " Marked" : " Mark for Review"
            )
          ),
          e("div", { className: "nav-row" },
            e("button", { className: "nav-btn", onClick: goPrev, disabled: cIdx === 0 }, ChevLeft(), " Previous"),
            e("button", { className: "nav-btn", onClick: goNext, disabled: cIdx === cDeck.length - 1 }, "Next ", ChevRight())
          )
        )
      : null
  );
}

ReactDOM.render(e(App), document.getElementById("root"));
</script>
</body>
</html>
