<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="100Q">
<meta name="theme-color" content="#0C1B0E">
<title>100Q — Qur'anic Phrases</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body, #root { height: 100%; overflow: hidden; }
  body { background: #0C1B0E; }

  .app {
    min-height: 100vh; min-height: 100dvh;
    background: linear-gradient(170deg, #0C1B0E 0%, #1A2F1C 40%, #0F1F12 100%);
    font-family: 'Cormorant Garamond', Georgia, serif;
    color: #E8E0D4;
    display: flex; flex-direction: column;
    overflow: hidden; position: relative;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
  }

  .card-wrapper { perspective: 1200px; width: 100%; max-width: 420px; margin: 0 auto; }
  .card-inner {
    position: relative; width: 100%; min-height: 340px;
    transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1);
    transform-style: preserve-3d; cursor: pointer;
  }
  .card-inner.flipped { transform: rotateY(180deg); }

  .card-face {
    position: absolute; inset: 0;
    backface-visibility: hidden; -webkit-backface-visibility: hidden;
    border-radius: 20px;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    padding: 32px 24px; overflow: hidden;
  }
  .card-front {
    background: linear-gradient(145deg, #1C2E1E 0%, #162516 50%, #1A2A1B 100%);
    border: 1px solid rgba(212, 168, 84, 0.2);
    box-shadow: 0 20px 60px rgba(0,0,0,0.4), inset 0 1px 0 rgba(212,168,84,0.08);
  }
  .card-back {
    background: linear-gradient(145deg, #2A1F10 0%, #1F1708 50%, #2A1F10 100%);
    border: 1px solid rgba(212, 168, 84, 0.3);
    box-shadow: 0 20px 60px rgba(0,0,0,0.4), inset 0 1px 0 rgba(212,168,84,0.12);
    transform: rotateY(180deg);
  }

  .ornament { position: absolute; width: 60px; height: 1px; background: linear-gradient(90deg, transparent, rgba(212,168,84,0.4), transparent); }
  .ornament-top { top: 20px; } .ornament-bottom { bottom: 20px; }
  .ornament-dot { position: absolute; width: 5px; height: 5px; border-radius: 50%; background: rgba(212,168,84,0.3); left: 50%; transform: translateX(-50%); }
  .ornament-dot-top { top: 12px; } .ornament-dot-bottom { bottom: 12px; }

  .arabic-text {
    font-family: 'Amiri', 'Traditional Arabic', serif;
    font-size: clamp(22px, 5.5vw, 32px); line-height: 1.9; color: #F5EDE0;
    text-align: center; direction: rtl; margin-bottom: 28px;
    letter-spacing: 0.02em; text-shadow: 0 1px 8px rgba(0,0,0,0.3);
  }
  .translit-text {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: clamp(14px, 3.5vw, 17px); font-style: italic;
    color: rgba(212, 168, 84, 0.75); text-align: center; line-height: 1.6; letter-spacing: 0.03em;
  }
  .english-text {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: clamp(18px, 4.5vw, 24px); font-weight: 400; color: #F5EDE0;
    text-align: center; line-height: 1.7; letter-spacing: 0.01em;
  }
  .tap-hint {
    font-size: 12px; color: rgba(212,168,84,0.35);
    text-transform: uppercase; letter-spacing: 0.2em; margin-top: 16px;
    font-family: 'Cormorant Garamond', Georgia, serif;
  }

  .nav-btn {
    background: rgba(212,168,84,0.08); border: 1px solid rgba(212,168,84,0.2);
    border-radius: 14px; color: #D4A854; padding: 12px 20px;
    font-family: 'Cormorant Garamond', Georgia, serif; font-size: 14px;
    letter-spacing: 0.08em; cursor: pointer; transition: all 0.2s;
    display: flex; align-items: center; gap: 6px; white-space: nowrap;
  }
  .nav-btn:active { background: rgba(212,168,84,0.18); transform: scale(0.97); }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }
  .nav-btn:disabled:active { transform: none; background: rgba(212,168,84,0.08); }

  .mark-btn {
    background: rgba(212,168,84,0.08); border: 1px solid rgba(212,168,84,0.25);
    border-radius: 14px; color: #D4A854; padding: 10px 16px;
    font-family: 'Cormorant Garamond', Georgia, serif; font-size: 13px;
    letter-spacing: 0.06em; cursor: pointer; transition: all 0.2s;
    display: flex; align-items: center; gap: 6px;
  }
  .mark-btn:active { transform: scale(0.97); }
  .mark-btn.active { background: rgba(212,168,84,0.15); border-color: rgba(212,168,84,0.45); }

  .header-btn {
    background: none; border: 1px solid rgba(212,168,84,0.18);
    border-radius: 10px; color: #D4A854; padding: 8px 14px;
    font-family: 'Cormorant Garamond', Georgia, serif; font-size: 13px;
    letter-spacing: 0.06em; cursor: pointer;
    display: flex; align-items: center; gap: 6px; transition: all 0.2s; white-space: nowrap;
  }
  .header-btn:active { background: rgba(212,168,84,0.1); }
  .header-btn.mode-active {
    background: rgba(212,168,84,0.12); border-color: rgba(212,168,84,0.4);
  }

  .progress-track { width: 100%; max-width: 420px; height: 3px; background: rgba(212,168,84,0.1); border-radius: 2px; margin: 0 auto; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, rgba(212,168,84,0.3), rgba(212,168,84,0.6)); border-radius: 2px; transition: width 0.4s ease; }

  @keyframes slideIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .slideIn { animation: slideIn 0.25s ease; }
  @keyframes slideOutLeft { to { opacity: 0; transform: translateX(-40px); } }
  .slideOutLeft { animation: slideOutLeft 0.2s ease forwards; }
  @keyframes slideOutRight { to { opacity: 0; transform: translateX(40px); } }
  .slideOutRight { animation: slideOutRight 0.2s ease forwards; }

  .badge {
    background: rgba(212,168,84,0.25); color: #D4A854;
    font-size: 11px; font-weight: 600; padding: 2px 7px;
    border-radius: 8px; min-width: 20px; text-align: center;
  }
  .empty-state { text-align: center; padding: 40px 20px; }

  /* ─── Multiple Choice Mode ─── */
  .mc-question-card {
    width: 100%; max-width: 420px; margin: 0 auto;
    background: linear-gradient(145deg, #1C2E1E 0%, #162516 50%, #1A2A1B 100%);
    border: 1px solid rgba(212, 168, 84, 0.2);
    box-shadow: 0 16px 48px rgba(0,0,0,0.35), inset 0 1px 0 rgba(212,168,84,0.08);
    border-radius: 20px;
    padding: 28px 24px 24px;
    position: relative; overflow: hidden;
  }

  .mc-option {
    width: 100%; max-width: 420px; margin: 0 auto;
    background: rgba(212,168,84,0.04);
    border: 1px solid rgba(212,168,84,0.15);
    border-radius: 14px; padding: 14px 18px;
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: clamp(14px, 3.5vw, 16px); color: #E8E0D4;
    text-align: left; cursor: pointer;
    transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    display: flex; align-items: flex-start; gap: 12px;
    line-height: 1.5;
  }
  .mc-option:active:not(.mc-locked) { transform: scale(0.98); }
  .mc-option:not(.mc-locked):hover {
    background: rgba(212,168,84,0.08);
    border-color: rgba(212,168,84,0.3);
  }
  .mc-option.mc-locked { cursor: default; }
  .mc-option.mc-correct {
    background: rgba(76, 175, 80, 0.12);
    border-color: rgba(76, 175, 80, 0.5);
    color: #A5D6A7;
  }
  .mc-option.mc-wrong {
    background: rgba(229, 115, 115, 0.1);
    border-color: rgba(229, 115, 115, 0.4);
    color: #EF9A9A;
  }
  .mc-option.mc-dimmed {
    opacity: 0.35;
  }

  .mc-letter {
    flex-shrink: 0; width: 26px; height: 26px;
    border-radius: 50%; border: 1px solid rgba(212,168,84,0.25);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 600; letter-spacing: 0;
    color: rgba(212,168,84,0.6); transition: all 0.25s;
  }
  .mc-correct .mc-letter {
    background: rgba(76,175,80,0.2); border-color: rgba(76,175,80,0.5); color: #A5D6A7;
  }
  .mc-wrong .mc-letter {
    background: rgba(229,115,115,0.15); border-color: rgba(229,115,115,0.4); color: #EF9A9A;
  }

  .mc-scoreboard {
    display: flex; justify-content: center; gap: 4px;
    padding: 0 20px; flex-shrink: 0;
  }
  .mc-score-item {
    display: flex; align-items: center; gap: 5px;
    padding: 5px 10px; border-radius: 8px;
    font-size: 12px; letter-spacing: 0.06em;
    font-family: 'Cormorant Garamond', Georgia, serif;
  }
  .mc-score-item.correct { color: #A5D6A7; background: rgba(76,175,80,0.08); }
  .mc-score-item.wrong { color: #EF9A9A; background: rgba(229,115,115,0.06); }
  .mc-score-item.review { color: #D4A854; background: rgba(212,168,84,0.08); }
  .mc-score-num { font-weight: 600; font-size: 15px; }

  @keyframes mcReveal { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .mc-reveal { animation: mcReveal 0.3s ease both; }
  .mc-reveal-1 { animation-delay: 50ms; }
  .mc-reveal-2 { animation-delay: 100ms; }
  .mc-reveal-3 { animation-delay: 150ms; }
  .mc-reveal-4 { animation-delay: 200ms; }

  .mc-feedback {
    text-align: center; font-size: 13px; letter-spacing: 0.1em;
    text-transform: uppercase; margin-top: 12px; min-height: 20px;
    transition: opacity 0.3s;
  }

  /* Mode toggle pill */
  .mode-toggle {
    display: flex; background: rgba(212,168,84,0.06);
    border: 1px solid rgba(212,168,84,0.15);
    border-radius: 10px; overflow: hidden; flex-shrink: 0;
  }
  .mode-toggle-btn {
    padding: 7px 12px; font-size: 11px; letter-spacing: 0.1em;
    text-transform: uppercase; cursor: pointer; transition: all 0.25s;
    font-family: 'Cormorant Garamond', Georgia, serif;
    color: rgba(212,168,84,0.45); background: none; border: none;
    font-weight: 500;
  }
  .mode-toggle-btn.active {
    color: #D4A854; background: rgba(212,168,84,0.12);
  }

  /* Completion screen */
  .mc-complete {
    text-align: center; padding: 32px 20px;
    max-width: 380px; margin: 0 auto;
  }
  .mc-complete-icon { font-size: 48px; margin-bottom: 16px; }
  .mc-complete-title {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 28px; color: #F5EDE0; font-weight: 300;
    margin-bottom: 8px;
  }
  .mc-complete-subtitle { font-size: 15px; color: rgba(212,168,84,0.5); margin-bottom: 28px; }
  .mc-final-stats {
    display: flex; justify-content: center; gap: 20px; margin-bottom: 32px;
  }
  .mc-final-stat { text-align: center; }
  .mc-final-stat-num { font-size: 32px; font-weight: 300; display: block; margin-bottom: 2px; }
  .mc-final-stat-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.2em; }
  .mc-final-stat.correct .mc-final-stat-num { color: #A5D6A7; }
  .mc-final-stat.wrong .mc-final-stat-num { color: #EF9A9A; }
  .mc-final-stat.review .mc-final-stat-num { color: #D4A854; }

  .mc-score-item.unanswered { color: rgba(212,168,84,0.45); background: rgba(212,168,84,0.04); }

  .mc-unanswered-btn {
    color: rgba(212,168,84,0.7) !important;
    border-color: rgba(212,168,84,0.2) !important;
  }
  .mc-unanswered-btn:active { background: rgba(212,168,84,0.12) !important; }

  .mc-finish-btn {
    background: rgba(76,175,80,0.08) !important;
    border-color: rgba(76,175,80,0.25) !important;
    color: #A5D6A7 !important;
  }
  .mc-finish-btn:active { background: rgba(76,175,80,0.15) !important; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script>
const e = React.createElement;
const { useState, useEffect, useCallback, useRef, useMemo } = React;

const PHRASES = [
  { id:1, ar:"\u0628\u0650\u0633\u0652\u0645\u0650 \u0627\u0644\u0644\u0651\u0670\u0647\u0650 \u0627\u0644\u0631\u0651\u064E\u062D\u0652\u0645\u0670\u0646\u0650 \u0627\u0644\u0631\u0651\u064E\u062D\u0650\u064A\u0652\u0645\u0650", tr:"Bismillāhi r-Raḥmāni r-Raḥīm", en:"In the name of Allah, the Most Gracious, the Most Merciful" },
  { id:2, ar:"\u0627\u0650\u0646\u0651\u064E \u0627\u0644\u0644\u0651\u0670\u0647\u064E \u063A\u064E\u0641\u064F\u0648\u0652\u0631\u064C \u0631\u0651\u064E\u062D\u0650\u064A\u0652\u0645\u064C", tr:"Inna Allāha Ghafūrun Raḥīm", en:"Indeed, Allah is Forgiving, Merciful" },
  { id:3, ar:"\u0648\u064E\u0627\u0644\u0644\u0651\u0670\u0647\u064F \u0639\u064E\u0644\u0650\u064A\u0652\u0645\u064C \u062D\u064E\u0643\u0650\u064A\u0652\u0645\u064C", tr:"Wa-Allāhu \u2018Alīmun Ḥakīm", en:"And Allah is Knowing, Wise" },
  { id:4, ar:"\u0641\u064E\u0628\u0650\u0627\u064E\u064A\u0650\u0651 \u0670\u0644\u064E\u0627\u0653\u0621\u0650 \u0631\u064E\u0628\u0650\u0651\u0643\u064F\u0645\u064E\u0627 \u062A\u064F\u0643\u064E\u0630\u0651\u0650\u0628\u0670\u0646\u0650", tr:"Fabi-ayyi ālā\u2019i Rabbikumā tukadhdhibān", en:"So which of the favors of your Lord would you deny?" },
  { id:5, ar:"\u0627\u0650\u0646\u0651\u064E \u0627\u0644\u0644\u0651\u0670\u0647\u064E \u0639\u064E\u0644\u0670\u0649 \u0643\u064F\u0644\u0650\u0651 \u0634\u064E\u064A\u0652\u0621\u064D \u0642\u064E\u062F\u0650\u064A\u0652\u0631\u064C", tr:"Inna Allāha \u2018alā kulli shay\u2019in Qadīr", en:"Indeed, Allah is over all things competent" },
  { id:6, ar:"\u0627\u0650\u0646\u0651\u064E \u0641\u0650\u064A\u0652 \u0630\u0670\u0644\u0650\u0643\u064E \u0644\u064E\u0627\u0670\u064A\u0670\u062A\u064D \u0644\u0651\u0650\u0642\u064E\u0648\u0652\u0645\u064D \u064A\u0651\u064E\u062A\u064E\u0641\u064E\u0643\u0651\u064E\u0631\u064F\u0648\u0652\u0646\u064E", tr:"Inna fī dhālika la-āyātin li-qawmin yatafakkarūn", en:"Indeed in that are signs for a people who give thought" },
  { id:7, ar:"\u0627\u0650\u0646\u0651\u064E \u0641\u0650\u064A\u0652 \u0630\u0670\u0644\u0650\u0643\u064E \u0644\u064E\u0627\u0670\u064A\u0670\u062A\u064D \u0644\u0651\u0650\u0642\u064E\u0648\u0652\u0645\u064D \u064A\u0651\u064F\u0624\u0652\u0645\u0650\u0646\u064F\u0648\u0652\u0646\u064E", tr:"Inna fī dhālika la-āyātin li-qawmin yu\u2019minūn", en:"Indeed in that are signs for a people who believe" },
  { id:8, ar:"\u0627\u0650\u0646\u0651\u064E \u0641\u0650\u064A\u0652 \u0630\u0670\u0644\u0650\u0643\u064E \u0644\u064E\u0627\u0670\u064A\u0670\u062A\u064D \u0644\u0651\u0650\u0642\u064E\u0648\u0652\u0645\u064D \u064A\u0651\u064E\u0639\u0652\u0642\u0650\u0644\u064F\u0648\u0652\u0646\u064E", tr:"Inna fī dhālika la-āyātin li-qawmin ya\u2019qilūn", en:"Indeed in that are signs for a people who reason" },
  { id:9, ar:"\u0648\u064E\u0627\u0644\u0644\u0651\u0670\u0647\u064F \u0628\u0650\u0643\u064F\u0644\u0650\u0651 \u0634\u064E\u064A\u0652\u0621\u064D \u0639\u064E\u0644\u0650\u064A\u0652\u0645\u064C", tr:"Wa-Allāhu bi-kulli shay\u2019in \u2018Alīm", en:"And Allah is Knowing of all things" },
  { id:10, ar:"\u0627\u0650\u0646\u0651\u064E \u0627\u0644\u0644\u0651\u0670\u0647\u064E \u0633\u064E\u0645\u0650\u064A\u0652\u0639\u064C \u0639\u064E\u0644\u0650\u064A\u0652\u0645\u064C", tr:"Inna Allāha Samī\u2018un \u2018Alīm", en:"Indeed, Allah is Hearing, Knowing" },
  { id:11, ar:"\u0648\u064E\u064A\u0652\u0644\u064C \u064A\u0651\u064E\u0648\u0652\u0645\u064E\u0626\u0650\u0630\u064D \u0644\u0651\u0650\u0644\u0652\u0645\u064F\u0643\u064E\u0630\u0651\u0650\u0628\u0650\u064A\u0652\u0646\u064E", tr:"Waylun yawma\u2019idhin lil-mukadhdhibīn", en:"Woe, that Day, to the deniers" },
  { id:12, ar:"\u0648\u064E\u0627\u062A\u0651\u064E\u0642\u064F\u0648\u0627 \u0627\u0644\u0644\u0651\u0670\u0647\u064E", tr:"Wa-ttaqū Allāh", en:"And fear Allah" },
  { id:13, ar:"\u0627\u0650\u0646\u0651\u064E \u0627\u0644\u0644\u0651\u0670\u0647\u064E \u0639\u064E\u0632\u0650\u064A\u0652\u0632\u064C \u062D\u064E\u0643\u0650\u064A\u0652\u0645\u064C", tr:"Inna Allāha \u2018Azīzun Ḥakīm", en:"Indeed, Allah is Exalted in Might, Wise" },
  { id:14, ar:"\u0644\u064E\u0639\u064E\u0644\u0651\u064E\u0643\u064F\u0645\u0652 \u062A\u064E\u062A\u0651\u064E\u0642\u064F\u0648\u0652\u0646\u064E", tr:"La\u2019allakum tattaqūn", en:"That you may become righteous" },
  { id:15, ar:"\u0648\u064E\u0627\u0644\u0644\u0651\u0670\u0647\u064F \u0639\u064E\u0644\u0650\u064A\u0652\u0645\u064C \u0628\u0650\u0630\u064E\u0627\u062A\u0650 \u0627\u0644\u0635\u0651\u064F\u062F\u064F\u0648\u0652\u0631\u0650", tr:"Wa-Allāhu \u2018Alīmun bi-dhāti ṣ-ṣudūr", en:"And Allah is Knowing of what is within the breasts" },
  { id:16, ar:"\u064A\u0670\u0653\u0627\u064E\u064A\u0651\u064F\u0647\u064E\u0627 \u0627\u0644\u0651\u064E\u0630\u0650\u064A\u0652\u0646\u064E \u0670\u0645\u064E\u0646\u064F\u0648\u0652\u0627", tr:"Yā ayyuha-lladhīna āmanū", en:"O you who have believed" },
  { id:17, ar:"\u0648\u064E\u0627\u0644\u0644\u0651\u0670\u0647\u064F \u063A\u064E\u0641\u064F\u0648\u0652\u0631\u064C \u0631\u0651\u064E\u062D\u0650\u064A\u0652\u0645\u064C", tr:"Wa-Allāhu Ghafūrun Raḥīm", en:"And Allah is Forgiving, Merciful" },

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; }
  return a;
}

  try { const d = localStorage.getItem("quran-fc-marked"); return d ? new Set(JSON.parse(d)) : new Set(); }

  try { localStorage.setItem("quran-fc-marked", JSON.stringify([...s])); } catch(e) {}
}

// Generate MC options: 1 correct + 3 random wrong
function genOptions(correctPhrase, allPhrases) {
  var wrong = allPhrases.filter(function(p) { return p.id !== correctPhrase.id; });
  var picked = shuffle(wrong).slice(0, 3);
  var opts = picked.map(function(p) { return { id: p.id, en: p.en, correct: false }; });
  opts.push({ id: correctPhrase.id, en: correctPhrase.en, correct: true });
  return shuffle(opts);
}
