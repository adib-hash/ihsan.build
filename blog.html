<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog | ihsan.build</title>
    <meta name="description" content="Thoughts and updates from the ihsan community.">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Inter:wght@300;400;600&family=Amiri:ital@0;1&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        .font-heading { font-family: 'Cinzel', serif; }
        .font-body { font-family: 'Inter', sans-serif; }
        .font-accent { font-family: 'Amiri', serif; }

        .reveal {
            opacity: 0;
            transform: translateY(30px);
            transition: all 1s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        .pattern-bg {
            background-color: #030712;
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(59, 130, 246, 0.03) 0%, transparent 50%),
                linear-gradient(30deg, #030712 12%, transparent 12.5%, transparent 87%, #030712 87.5%, #030712),
                linear-gradient(150deg, #030712 12%, transparent 12.5%, transparent 87%, #030712 87.5%, #030712),
                linear-gradient(30deg, #030712 12%, transparent 12.5%, transparent 87%, #030712 87.5%, #030712),
                linear-gradient(150deg, #030712 12%, transparent 12.5%, transparent 87%, #030712 87.5%, #030712),
                linear-gradient(60deg, rgba(255, 255, 255, 0.03) 25%, transparent 25.5%, transparent 75%, rgba(255, 255, 255, 0.03) 75%, rgba(255, 255, 255, 0.03)),
                linear-gradient(60deg, rgba(255, 255, 255, 0.03) 25%, transparent 25.5%, transparent 75%, rgba(255, 255, 255, 0.03) 75%, rgba(255, 255, 255, 0.03));
            background-size: 80px 140px;
            background-position: 0 0, 0 0, 0 0, 40px 70px, 40px 70px, 0 0, 40px 70px;
        }

        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #030712; }
        ::-webkit-scrollbar-thumb { background: #1e3a8a; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #1d4ed8; }

        /* Post body preserves line breaks */
        .post-body { white-space: pre-line; }
    </style>
</head>
<body class="bg-gray-950 text-slate-200 font-body overflow-x-hidden selection:bg-blue-900 selection:text-blue-100">

    <!-- Navigation -->
    <nav class="fixed w-full z-50 transition-all duration-300 py-6 bg-gray-950/90 backdrop-blur-md" id="navbar">
        <div class="max-w-7xl mx-auto px-6 flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-2 group">
                <span class="text-xl font-heading text-blue-400">ihsan</span>
            </a>
            <div class="hidden md:flex gap-8 text-sm uppercase tracking-widest text-slate-400 font-light">
                <a href="index.html#mission" class="hover:text-blue-400 transition-colors">Mission</a>
                <a href="index.html#pillars" class="hover:text-blue-400 transition-colors">Pillars</a>
                <a href="index.html#community" class="hover:text-blue-400 transition-colors">Community</a>
                <a href="blog.html" class="text-blue-400 transition-colors">Blog</a>
            </div>
            <a href="index.html#join" class="hidden md:block px-6 py-2 border border-blue-500/30 text-blue-400 hover:bg-blue-500/10 transition-colors text-sm uppercase tracking-widest rounded-sm">
                Join Us
            </a>
            <button class="md:hidden text-white" onclick="document.getElementById('mobile-menu').classList.toggle('hidden')">
                <i data-lucide="menu"></i>
            </button>
        </div>
        <div id="mobile-menu" class="hidden absolute top-full left-0 w-full bg-gray-950 border-b border-slate-800 p-6 flex flex-col gap-4 md:hidden text-center glass">
            <a href="index.html#mission" class="hover:text-blue-400 transition-colors">Mission</a>
            <a href="index.html#pillars" class="hover:text-blue-400 transition-colors">Pillars</a>
            <a href="index.html#community" class="hover:text-blue-400 transition-colors">Community</a>
            <a href="blog.html" class="text-blue-400 transition-colors">Blog</a>
            <a href="index.html#join" class="px-6 py-2 border border-blue-500/30 text-blue-400 hover:bg-blue-500/10 transition-colors text-sm uppercase tracking-widest rounded-sm">
                Join Us
            </a>
        </div>
    </nav>

    <!-- Blog Header -->
    <header class="pt-32 pb-16 pattern-bg border-b border-slate-900">
        <div class="max-w-3xl mx-auto px-6">
            <h1 class="text-4xl md:text-5xl font-heading text-white mb-4">Blog</h1>
            <p class="text-slate-400 font-light text-lg">Thoughts on building with <span class="text-blue-400 font-accent italic">ihsan</span>.</p>
        </div>
    </header>

    <!-- Blog List View -->
    <main id="blog-list" class="py-16 bg-gray-950 min-h-[50vh]">
        <div class="max-w-3xl mx-auto px-6">
            <div id="posts-container" class="space-y-0 divide-y divide-slate-800/60">
                <!-- Posts injected by JS -->
            </div>
            <p id="no-posts" class="hidden text-slate-500 text-center py-20">No posts yet.</p>
        </div>
    </main>

    <!-- Single Post View (hidden by default) -->
    <main id="blog-post" class="hidden py-16 bg-gray-950 min-h-[50vh]">
        <div class="max-w-3xl mx-auto px-6">
            <button onclick="showList()" class="inline-flex items-center gap-2 text-sm text-slate-500 hover:text-blue-400 transition-colors mb-10 uppercase tracking-widest">
                <i data-lucide="arrow-left" class="w-4 h-4"></i> All Posts
            </button>
            <article>
                <h2 id="post-title" class="text-3xl md:text-4xl font-heading text-white mb-3"></h2>
                <time id="post-date" class="text-sm text-slate-500 uppercase tracking-widest block mb-10"></time>
                <div class="w-12 h-[1px] bg-blue-500/50 mb-10"></div>
                <div id="post-body" class="post-body text-slate-300 leading-relaxed text-[17px]"></div>
            </article>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-gray-950 py-12 border-t border-slate-900">
        <div class="max-w-4xl mx-auto px-6 text-center text-slate-600 text-sm">
            &copy; 2025 ihsan.build. All rights reserved.
        </div>
    </footer>

    <!-- Load posts data -->
    <script src="posts.js"></script>

    <script>
        lucide.createIcons();

        const listView = document.getElementById('blog-list');
        const postView = document.getElementById('blog-post');
        const container = document.getElementById('posts-container');
        const noPostsMsg = document.getElementById('no-posts');

        function formatDate(dateStr) {
            const d = new Date(dateStr + 'T00:00:00');
            return d.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
        }

        function renderList() {
            if (!POSTS || POSTS.length === 0) {
                noPostsMsg.classList.remove('hidden');
                return;
            }

            container.innerHTML = POSTS.map((post, i) => {
                const preview = post.body.split('\n')[0].substring(0, 160) + (post.body.length > 160 ? '…' : '');
                return `
                    <a href="#" onclick="showPost(${i}); return false;" class="block py-8 group">
                        <time class="text-xs text-slate-500 uppercase tracking-widest">${formatDate(post.date)}</time>
                        <h3 class="text-xl font-heading text-white mt-2 mb-2 group-hover:text-blue-400 transition-colors">${post.title}</h3>
                        <p class="text-slate-400 text-sm leading-relaxed">${preview}</p>
                        <span class="inline-flex items-center gap-1 text-xs text-blue-500 mt-3 uppercase tracking-widest opacity-0 group-hover:opacity-100 transition-opacity">
                            Read <i data-lucide="arrow-right" class="w-3 h-3"></i>
                        </span>
                    </a>
                `;
            }).join('');

            lucide.createIcons();
        }

        function showPost(index) {
            const post = POSTS[index];
            document.getElementById('post-title').textContent = post.title;
            document.getElementById('post-date').textContent = formatDate(post.date);
            document.getElementById('post-body').textContent = post.body;

            listView.classList.add('hidden');
            postView.classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });

            // Update URL hash for shareability
            history.pushState({ postIndex: index }, '', `#post-${index}`);
        }

        function showList() {
            postView.classList.add('hidden');
            listView.classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
            history.pushState({}, '', 'blog.html');
        }

        // Handle back button
        window.addEventListener('popstate', (e) => {
            if (e.state && typeof e.state.postIndex === 'number') {
                showPost(e.state.postIndex);
            } else {
                showList();
            }
        });

        // Handle direct link to a post via hash
        function checkHash() {
            const hash = window.location.hash;
            const match = hash.match(/^#post-(\d+)$/);
            if (match) {
                const idx = parseInt(match[1]);
                if (idx >= 0 && idx < POSTS.length) {
                    showPost(idx);
                    return;
                }
            }
        }

        renderList();
        checkHash();
    </script>
</body>
</html>
