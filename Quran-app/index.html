<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Quran Phrases">
<meta name="theme-color" content="#0C1B0E">
<title>Qur'anic Phrases — Flashcards</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body, #root { height: 100%; overflow: hidden; }
  body { background: #0C1B0E; }

  .app {
    min-height: 100vh; min-height: 100dvh;
    background: linear-gradient(170deg, #0C1B0E 0%, #1A2F1C 40%, #0F1F12 100%);
    font-family: 'Cormorant Garamond', Georgia, serif;
    color: #E8E0D4;
    display: flex; flex-direction: column;
    overflow: hidden; position: relative;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
  }

  .card-wrapper { perspective: 1200px; width: 100%; max-width: 420px; margin: 0 auto; }
  .card-inner {
    position: relative; width: 100%; min-height: 340px;
    transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1);
    transform-style: preserve-3d; cursor: pointer;
  }
  .card-inner.flipped { transform: rotateY(180deg); }

  .card-face {
    position: absolute; inset: 0;
    backface-visibility: hidden; -webkit-backface-visibility: hidden;
    border-radius: 20px;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    padding: 32px 24px; overflow: hidden;
  }
  .card-front {
    background: linear-gradient(145deg, #1C2E1E 0%, #162516 50%, #1A2A1B 100%);
    border: 1px solid rgba(212, 168, 84, 0.2);
    box-shadow: 0 20px 60px rgba(0,0,0,0.4), inset 0 1px 0 rgba(212,168,84,0.08);
  }
  .card-back {
    background: linear-gradient(145deg, #2A1F10 0%, #1F1708 50%, #2A1F10 100%);
    border: 1px solid rgba(212, 168, 84, 0.3);
    box-shadow: 0 20px 60px rgba(0,0,0,0.4), inset 0 1px 0 rgba(212,168,84,0.12);
    transform: rotateY(180deg);
  }

  .ornament { position: absolute; width: 60px; height: 1px; background: linear-gradient(90deg, transparent, rgba(212,168,84,0.4), transparent); }
  .ornament-top { top: 20px; } .ornament-bottom { bottom: 20px; }
  .ornament-dot { position: absolute; width: 5px; height: 5px; border-radius: 50%; background: rgba(212,168,84,0.3); left: 50%; transform: translateX(-50%); }
  .ornament-dot-top { top: 12px; } .ornament-dot-bottom { bottom: 12px; }

  .arabic-text {
    font-family: 'Amiri', 'Traditional Arabic', serif;
    font-size: clamp(22px, 5.5vw, 32px); line-height: 1.9; color: #F5EDE0;
    text-align: center; direction: rtl; margin-bottom: 28px;
    letter-spacing: 0.02em; text-shadow: 0 1px 8px rgba(0,0,0,0.3);
  }
  .translit-text {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: clamp(14px, 3.5vw, 17px); font-style: italic;
    color: rgba(212, 168, 84, 0.75); text-align: center; line-height: 1.6; letter-spacing: 0.03em;
  }
  .english-text {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: clamp(18px, 4.5vw, 24px); font-weight: 400; color: #F5EDE0;
    text-align: center; line-height: 1.7; letter-spacing: 0.01em;
  }
  .tap-hint {
    font-size: 12px; color: rgba(212,168,84,0.35);
    text-transform: uppercase; letter-spacing: 0.2em; margin-top: 16px;
    font-family: 'Cormorant Garamond', Georgia, serif;
  }

  .nav-btn {
    background: rgba(212,168,84,0.08); border: 1px solid rgba(212,168,84,0.2);
    border-radius: 14px; color: #D4A854; padding: 12px 20px;
    font-family: 'Cormorant Garamond', Georgia, serif; font-size: 14px;
    letter-spacing: 0.08em; cursor: pointer; transition: all 0.2s;
    display: flex; align-items: center; gap: 6px; white-space: nowrap;
  }
  .nav-btn:active { background: rgba(212,168,84,0.18); transform: scale(0.97); }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }
  .nav-btn:disabled:active { transform: none; background: rgba(212,168,84,0.08); }

  .mark-btn {
    background: rgba(212,168,84,0.08); border: 1px solid rgba(212,168,84,0.25);
    border-radius: 14px; color: #D4A854; padding: 10px 16px;
    font-family: 'Cormorant Garamond', Georgia, serif; font-size: 13px;
    letter-spacing: 0.06em; cursor: pointer; transition: all 0.2s;
    display: flex; align-items: center; gap: 6px;
  }
  .mark-btn:active { transform: scale(0.97); }
  .mark-btn.active { background: rgba(212,168,84,0.15); border-color: rgba(212,168,84,0.45); }

  .header-btn {
    background: none; border: 1px solid rgba(212,168,84,0.18);
    border-radius: 10px; color: #D4A854; padding: 8px 14px;
    font-family: 'Cormorant Garamond', Georgia, serif; font-size: 13px;
    letter-spacing: 0.06em; cursor: pointer;
    display: flex; align-items: center; gap: 6px; transition: all 0.2s; white-space: nowrap;
  }
  .header-btn:active { background: rgba(212,168,84,0.1); }

  .progress-track { width: 100%; max-width: 420px; height: 3px; background: rgba(212,168,84,0.1); border-radius: 2px; margin: 0 auto; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, rgba(212,168,84,0.3), rgba(212,168,84,0.6)); border-radius: 2px; transition: width 0.4s ease; }

  @keyframes slideIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .slideIn { animation: slideIn 0.25s ease; }
  @keyframes slideOutLeft { to { opacity: 0; transform: translateX(-40px); } }
  .slideOutLeft { animation: slideOutLeft 0.2s ease forwards; }
  @keyframes slideOutRight { to { opacity: 0; transform: translateX(40px); } }
  .slideOutRight { animation: slideOutRight 0.2s ease forwards; }

  .badge {
    background: rgba(212,168,84,0.25); color: #D4A854;
    font-size: 11px; font-weight: 600; padding: 2px 7px;
    border-radius: 8px; min-width: 20px; text-align: center;
  }
  .empty-state { text-align: center; padding: 40px 20px; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script>
const e = React.createElement;
const { useState, useEffect, useCallback, useRef } = React;

const PHRASES = [
  { id:1, ar:"بِسْمِ اللّٰهِ الرَّحْمٰنِ الرَّحِيْمِ", tr:"Bismillāhi r-Raḥmāni r-Raḥīm", en:"In the name of Allah, the Most Gracious, the Most Merciful" },
  { id:2, ar:"اِنَّ اللّٰهَ غَفُوْرٌ رَّحِيْمٌ", tr:"Inna Allāha Ghafūrun Raḥīm", en:"Indeed, Allah is Forgiving, Merciful" },
  { id:3, ar:"وَاللّٰهُ عَلِيْمٌ حَكِيْمٌ", tr:"Wa-Allāhu 'Alīmun Ḥakīm", en:"And Allah is Knowing, Wise" },
  { id:4, ar:"فَبِاَيِّ اٰلَآءِ رَبِّكُمَا تُكَذِّبٰنِ", tr:"Fabi-ayyi ālā'i Rabbikumā tukadhdhibān", en:"So which of the favors of your Lord would you deny?" },
  { id:5, ar:"اِنَّ اللّٰهَ عَلٰى كُلِّ شَيْءٍ قَدِيْرٌ", tr:"Inna Allāha 'alā kulli shay'in Qadīr", en:"Indeed, Allah is over all things competent" },
  { id:6, ar:"اِنَّ فِيْ ذٰلِكَ لَاٰيٰتٍ لِّقَوْمٍ يَّتَفَكَّرُوْنَ", tr:"Inna fī dhālika la-āyātin li-qawmin yatafakkarūn", en:"Indeed in that are signs for a people who give thought" },
  { id:7, ar:"اِنَّ فِيْ ذٰلِكَ لَاٰيٰتٍ لِّقَوْمٍ يُّؤْمِنُوْنَ", tr:"Inna fī dhālika la-āyātin li-qawmin yu'minūn", en:"Indeed in that are signs for a people who believe" },
  { id:8, ar:"اِنَّ فِيْ ذٰلِكَ لَاٰيٰتٍ لِّقَوْمٍ يَّعْقِلُوْنَ", tr:"Inna fī dhālika la-āyātin li-qawmin ya'qilūn", en:"Indeed in that are signs for a people who reason" },
  { id:9, ar:"وَاللّٰهُ بِكُلِّ شَيْءٍ عَلِيْمٌ", tr:"Wa-Allāhu bi-kulli shay'in 'Alīm", en:"And Allah is Knowing of all things" },
  { id:10, ar:"اِنَّ اللّٰهَ سَمِيْعٌ عَلِيْمٌ", tr:"Inna Allāha Samī'un 'Alīm", en:"Indeed, Allah is Hearing, Knowing" },
  { id:11, ar:"وَيْلٌ يَّوْمَئِذٍ لِّلْمُكَذِّبِيْنَ", tr:"Waylun yawma'idhin lil-mukadhdhibīn", en:"Woe, that Day, to the deniers" },
  { id:12, ar:"وَاتَّقُوا اللّٰهَ", tr:"Wa-ttaqū Allāh", en:"And fear Allah" },
  { id:13, ar:"اِنَّ اللّٰهَ عَزِيْزٌ حَكِيْمٌ", tr:"Inna Allāha 'Azīzun Ḥakīm", en:"Indeed, Allah is Exalted in Might, Wise" },
  { id:14, ar:"لَعَلَّكُمْ تَتَّقُوْنَ", tr:"La'allakum tattaqūn", en:"That you may become righteous" },
  { id:15, ar:"وَاللّٰهُ عَلِيْمٌ بِذَاتِ الصُّدُوْرِ", tr:"Wa-Allāhu 'Alīmun bi-dhāti ṣ-ṣudūr", en:"And Allah is Knowing of what is within the breasts" },
  { id:16, ar:"يٰٓاَيُّهَا الَّذِيْنَ اٰمَنُوْا", tr:"Yā ayyuha-lladhīna āmanū", en:"O you who have believed" },
  { id:17, ar:"وَاللّٰهُ غَفُوْرٌ رَّحِيْمٌ", tr:"Wa-Allāhu Ghafūrun Raḥīm", en:"And Allah is Forgiving, Merciful" },
  { id:18, ar:"اِنَّ اللّٰهَ لَا يُحِبُّ", tr:"Inna Allāha lā yuḥibbu", en:"Indeed, Allah does not love..." },
  { id:19, ar:"اَفَلَا تَعْقِلُوْنَ", tr:"Afalā ta'qilūn", en:"Then will you not reason?" },
  { id:20, ar:"اَفَلَا يَتَدَبَّرُوْنَ", tr:"Afalā yatadabbarūn", en:"Then do they not reflect?" },
  { id:21, ar:"وَمَا اللّٰهُ بِغَافِلٍ عَمَّا تَعْمَلُوْنَ", tr:"Wa mā Allāhu bi-ghāfilin 'ammā ta'malūn", en:"And Allah is not unaware of what you do" },
  { id:22, ar:"وَاِلَى اللّٰهِ الْمَصِيْرُ", tr:"Wa ilā-Allāhi l-maṣīr", en:"And to Allah is the destination" },
  { id:23, ar:"لَعَلَّكُمْ تُفْلِحُوْنَ", tr:"La'allakum tufliḥūn", en:"That you may succeed" },
  { id:24, ar:"اِنَّ اللّٰهَ كَانَ غَفُوْرًا رَّحِيْمًا", tr:"Inna Allāha kāna Ghafūran Raḥīmā", en:"Indeed, Allah is ever Forgiving, Merciful" },
  { id:25, ar:"وَاللّٰهُ وَاسِعٌ عَلِيْمٌ", tr:"Wa-Allāhu Wāsi'un 'Alīm", en:"And Allah is all-Encompassing, Knowing" },
  { id:26, ar:"اِنَّ اللّٰهَ كَانَ عَلِيْمًا حَكِيْمًا", tr:"Inna Allāha kāna 'Alīman Ḥakīmā", en:"Indeed, Allah is ever Knowing, Wise" },
  { id:27, ar:"وَاللّٰهُ يَعْلَمُ وَاَنْتُمْ لَا تَعْلَمُوْنَ", tr:"Wa-Allāhu ya'lamu wa antum lā ta'lamūn", en:"And Allah knows while you know not" },
  { id:28, ar:"قُلْ هُوَ اللّٰهُ اَحَدٌ", tr:"Qul huwa-Allāhu Aḥad", en:"Say: He is Allah, the One" },
  { id:29, ar:"سُبْحٰنَ اللّٰهِ", tr:"Subḥāna-Allāh", en:"Glory be to Allah" },
  { id:30, ar:"اَلْحَمْدُ لِلّٰهِ رَبِّ الْعٰلَمِيْنَ", tr:"Al-ḥamdu lillāhi Rabbi l-'ālamīn", en:"All praise is due to Allah, Lord of the worlds" },
  { id:31, ar:"خٰلِدِيْنَ فِيْهَا اَبَدًا", tr:"Khālidīna fīhā abadā", en:"Abiding therein forever" },
  { id:32, ar:"تَجْرِيْ مِنْ تَحْتِهَا الْاَنْهٰرُ", tr:"Tajrī min taḥtiha l-anhār", en:"Beneath which rivers flow" },
  { id:33, ar:"مِنْ دُوْنِ اللّٰهِ", tr:"Min dūni-Allāh", en:"Other than Allah / besides Allah" },
  { id:34, ar:"اِنَّ اللّٰهَ كَانَ عَلِيًّا كَبِيْرًا", tr:"Inna Allāha kāna 'Aliyyan Kabīrā", en:"Indeed, Allah is ever High, Grand" },
  { id:35, ar:"وَتُوْبُوْٓا اِلَى اللّٰهِ", tr:"Wa tūbū ilā-Allāh", en:"And turn to Allah in repentance" },
  { id:36, ar:"فَاتَّقُوا اللّٰهَ وَاَطِيْعُوْنِ", tr:"Fa-ttaqū Allāha wa aṭī'ūn", en:"So fear Allah and obey me" },
  { id:37, ar:"اِنِّيْ لَكُمْ رَسُوْلٌ اَمِيْنٌ", tr:"Innī lakum rasūlun amīn", en:"Indeed, I am to you a trustworthy messenger" },
  { id:38, ar:"وَمَآ اَرْسَلْنٰكَ اِلَّا رَحْمَةً لِّلْعٰلَمِيْنَ", tr:"Wa mā arsalnāka illā raḥmatan lil-'ālamīn", en:"And We have not sent you except as a mercy to the worlds" },
  { id:39, ar:"كَذٰلِكَ يُبَيِّنُ اللّٰهُ لَكُمْ اٰيٰتِهٖ", tr:"Kadhālika yubayyinu Allāhu lakum āyātih", en:"Thus does Allah make clear to you His verses" },
  { id:40, ar:"اُولٰٓئِكَ اَصْحٰبُ النَّارِ هُمْ فِيْهَا خٰلِدُوْنَ", tr:"Ulā'ika aṣḥābu n-nār hum fīhā khālidūn", en:"Those are the companions of the Fire; they abide therein eternally" },
  { id:41, ar:"وَاللّٰهُ لَا يُحِبُّ الظّٰلِمِيْنَ", tr:"Wa-Allāhu lā yuḥibbu ẓ-ẓālimīn", en:"And Allah does not love the wrongdoers" },
  { id:42, ar:"اِنَّ اللّٰهَ يُحِبُّ الْمُحْسِنِيْنَ", tr:"Inna Allāha yuḥibbu l-muḥsinīn", en:"Indeed, Allah loves the doers of good" },
  { id:43, ar:"ذٰلِكَ بِاَنَّهُمْ كَانُوْا يَكْفُرُوْنَ", tr:"Dhālika bi-annahum kānū yakfurūn", en:"That is because they used to disbelieve" },
  { id:44, ar:"اِنَّ فِيْ ذٰلِكَ لَاٰيَةً", tr:"Inna fī dhālika la-āyah", en:"Indeed in that is a sign" },
  { id:45, ar:"وَمَنْ يُّؤْمِنْ بِاللّٰهِ وَالْيَوْمِ الْاٰخِرِ", tr:"Wa man yu'min billāhi wa l-yawmi l-ākhir", en:"And whoever believes in Allah and the Last Day" },
  { id:46, ar:"اِنَّ اللّٰهَ كَانَ سَمِيْعًا بَصِيْرًا", tr:"Inna Allāha kāna Samī'an Baṣīrā", en:"Indeed, Allah is ever Hearing, Seeing" },
  { id:47, ar:"وَسَبِّحْ بِحَمْدِ رَبِّكَ", tr:"Wa sabbiḥ bi-ḥamdi Rabbik", en:"And exalt with praise of your Lord" },
  { id:48, ar:"كَذٰلِكَ نُفَصِّلُ الْاٰيٰتِ لِقَوْمٍ يَّعْلَمُوْنَ", tr:"Kadhālika nufaṣṣilu l-āyāti li-qawmin ya'lamūn", en:"Thus We detail the signs for a people who know" },
  { id:49, ar:"اِنَّ اللّٰهَ لَا يَهْدِي الْقَوْمَ الظّٰلِمِيْنَ", tr:"Inna Allāha lā yahdī l-qawma ẓ-ẓālimīn", en:"Indeed, Allah does not guide the wrongdoing people" },
  { id:50, ar:"رَبَّنَا لَا تُؤَاخِذْنَآ اِنْ نَّسِيْنَآ اَوْ اَخْطَأْنَا", tr:"Rabbanā lā tu'ākhidhnā in nasīnā aw akhṭa'nā", en:"Our Lord, do not impose blame upon us if we forget or err" },
  { id:51, ar:"اِنَّ اللّٰهَ كَانَ تَوَّابًا رَّحِيْمًا", tr:"Inna Allāha kāna Tawwāban Raḥīmā", en:"Indeed, Allah is ever Accepting of repentance, Merciful" },
  { id:52, ar:"وَاللّٰهُ عَلٰى كُلِّ شَيْءٍ قَدِيْرٌ", tr:"Wa-Allāhu 'alā kulli shay'in Qadīr", en:"And Allah is over all things competent" },
  { id:53, ar:"اِنَّا كَذٰلِكَ نَجْزِي الْمُحْسِنِيْنَ", tr:"Innā kadhālika najzī l-muḥsinīn", en:"Indeed, We thus reward the doers of good" },
  { id:54, ar:"وَمَا يَعْلَمُ جُنُوْدَ رَبِّكَ اِلَّا هُوَ", tr:"Wa mā ya'lamu junūda Rabbika illā Huwa", en:"And none knows the soldiers of your Lord except Him" },
  { id:55, ar:"فَاذْكُرُوْنِيْ اَذْكُرْكُمْ", tr:"Fa-dhkurūnī adhkurkum", en:"So remember Me; I will remember you" },
  { id:56, ar:"وَاللّٰهُ يَرْزُقُ مَنْ يَّشَآءُ بِغَيْرِ حِسَابٍ", tr:"Wa-Allāhu yarzuqu man yashā'u bi-ghayri ḥisāb", en:"And Allah provides for whom He wills without account" },
  { id:57, ar:"وَاللّٰهُ لَا يُحِبُّ كُلَّ مُخْتَالٍ فَخُوْرٍ", tr:"Wa-Allāhu lā yuḥibbu kulla mukhtālin fakhūr", en:"And Allah does not like every self-deluded boaster" },
  { id:58, ar:"اَلَمْ تَرَ اِلَى الَّذِيْنَ", tr:"Alam tara ila-lladhīna", en:"Have you not seen those who..." },
  { id:59, ar:"كُنْتُمْ خَيْرَ اُمَّةٍ اُخْرِجَتْ لِلنَّاسِ", tr:"Kuntum khayra ummatin ukhrijat lin-nās", en:"You are the best nation produced for mankind" },
  { id:60, ar:"وَهُوَ الْعَزِيْزُ الْحَكِيْمُ", tr:"Wa huwa l-'Azīzu l-Ḥakīm", en:"And He is the Exalted in Might, the Wise" },
  { id:61, ar:"وَهُوَ السَّمِيْعُ الْعَلِيْمُ", tr:"Wa huwa s-Samī'u l-'Alīm", en:"And He is the Hearing, the Knowing" },
  { id:62, ar:"وَاللّٰهُ خَبِيْرٌ بِمَا تَعْمَلُوْنَ", tr:"Wa-Allāhu Khabīrun bimā ta'malūn", en:"And Allah is Acquainted with what you do" },
  { id:63, ar:"اِنَّ اللّٰهَ لَا يَهْدِي الْقَوْمَ الْكٰفِرِيْنَ", tr:"Inna Allāha lā yahdī l-qawma l-kāfirīn", en:"Indeed, Allah does not guide the disbelieving people" },

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; }
  return a;
}

function loadMarked() {
  try { const d = localStorage.getItem("quran-fc-marked"); return d ? new Set(JSON.parse(d)) : new Set(); }
  catch(e) { return new Set(); }
}
function saveMarked(s) {
  try { localStorage.setItem("quran-fc-marked", JSON.stringify([...s])); } catch(e) {}
}

// SVG icon helpers
function Icon(props) {
  return e("svg", { width: props.w||20, height: props.h||20, viewBox:"0 0 24 24", fill: props.fill||"none", stroke: props.stroke||"currentColor", strokeWidth: props.sw||"2", strokeLinecap:"round", strokeLinejoin:"round", style: props.style }, ...(props.children||[]));
}
const ChevLeft = () => Icon({}, e("polyline",{points:"15 18 9 12 15 6",key:"c"}));
const ChevRight = () => Icon({}, e("polyline",{points:"9 18 15 12 9 6",key:"c"}));
const BookmarkSvg = (f) => Icon({w:18,h:18,fill:f?"#D4A854":"none",stroke:"#D4A854"}, e("path",{d:"M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z",key:"b"}));
const ListSvg = () => Icon({}, e("line",{x1:8,y1:6,x2:21,y2:6,key:"1"}),e("line",{x1:8,y1:12,x2:21,y2:12,key:"2"}),e("line",{x1:8,y1:18,x2:21,y2:18,key:"3"}),e("line",{x1:3,y1:6,x2:3.01,y2:6,key:"4"}),e("line",{x1:3,y1:12,x2:3.01,y2:12,key:"5"}),e("line",{x1:3,y1:18,x2:3.01,y2:18,key:"6"}));
const BackSvg = () => Icon({sw:"2.5"}, e("line",{x1:19,y1:12,x2:5,y2:12,key:"1"}),e("polyline",{points:"12 19 5 12 12 5",key:"2"}));
const ShuffleSvg = () => Icon({w:18,h:18}, e("polyline",{points:"16 3 21 3 21 8",key:"1"}),e("line",{x1:4,y1:20,x2:21,y2:3,key:"2"}),e("polyline",{points:"21 16 21 21 16 21",key:"3"}),e("line",{x1:15,y1:15,x2:21,y2:21,key:"4"}),e("line",{x1:4,y1:4,x2:9,y2:9,key:"5"}));

function App() {
  const [deck, setDeck] = useState(() => shuffle(PHRASES));
  const [index, setIndex] = useState(0);
  const [flipped, setFlipped] = useState(false);
  const [marked, setMarked] = useState(loadMarked);
  const [view, setView] = useState("study");
  const [reviewDeck, setReviewDeck] = useState([]);
  const [reviewIndex, setReviewIndex] = useState(0);
  const [reviewFlipped, setReviewFlipped] = useState(false);
  const [swipeDir, setSwipeDir] = useState(null);
  const touchStart = useRef(null);

  const cDeck = view === "study" ? deck : reviewDeck;
  const cIdx = view === "study" ? index : reviewIndex;
  const cFlip = view === "study" ? flipped : reviewFlipped;
  const setCIdx = view === "study" ? setIndex : setReviewIndex;
  const setCFlip = view === "study" ? setFlipped : setReviewFlipped;
  const card = cDeck[cIdx];

  useEffect(() => { saveMarked(marked); }, [marked]);

  const reshuffle = useCallback(() => { setDeck(shuffle(PHRASES)); setIndex(0); setFlipped(false); }, []);

  const goNext = useCallback(() => {
    if (cIdx < cDeck.length - 1) {
      setSwipeDir("left");
      setTimeout(() => { setCIdx(i => i + 1); setCFlip(false); setSwipeDir(null); }, 200);
    }
  }, [cIdx, cDeck.length, setCIdx, setCFlip]);

  const goPrev = useCallback(() => {
    if (cIdx > 0) {
      setSwipeDir("right");
      setTimeout(() => { setCIdx(i => i - 1); setCFlip(false); setSwipeDir(null); }, 200);
    }
  }, [cIdx, setCIdx, setCFlip]);

  const toggleMark = useCallback(() => {
    if (!card) return;
    setMarked(prev => { const n = new Set(prev); if (n.has(card.id)) n.delete(card.id); else n.add(card.id); return n; });
  }, [card]);

  const openReview = useCallback(() => {
    const items = PHRASES.filter(p => marked.has(p.id));
    setReviewDeck(shuffle(items)); setReviewIndex(0); setReviewFlipped(false); setView("review");
  }, [marked]);

  const onTS = (ev) => { touchStart.current = ev.touches[0].clientX; };
  const onTE = (ev) => {
    if (touchStart.current === null) return;
    const d = ev.changedTouches[0].clientX - touchStart.current;
    if (d > 60) goPrev(); else if (d < -60) goNext();
    touchStart.current = null;
  };

  useEffect(() => {
    const h = (ev) => {
      if (ev.key === "ArrowRight") goNext();
      else if (ev.key === "ArrowLeft") goPrev();
      else if (ev.key === " ") { ev.preventDefault(); setCFlip(f => !f); }
    };
    window.addEventListener("keydown", h);
    return () => window.removeEventListener("keydown", h);
  }, [goNext, goPrev, setCFlip]);

  const slideClass = swipeDir === "left" ? "slideOutLeft" : swipeDir === "right" ? "slideOutRight" : "slideIn";

  function renderCard(c, isFlipped, onFlip, k) {
    return e("div", { className: "card-wrapper " + slideClass, key: k },
      e("div", { className: "card-inner" + (isFlipped ? " flipped" : ""), onClick: onFlip },
        e("div", { className: "card-face card-front" },
          e("div", { className: "ornament ornament-top" }),
          e("div", { className: "ornament-dot ornament-dot-top" }),
          e("div", { className: "arabic-text" }, c.ar),
          e("div", { className: "translit-text" }, c.tr),
          e("div", { className: "tap-hint" }, "tap to reveal"),
          e("div", { className: "ornament ornament-bottom" }),
          e("div", { className: "ornament-dot ornament-dot-bottom" })
        ),
        e("div", { className: "card-face card-back" },
          e("div", { className: "ornament ornament-top" }),
          e("div", { className: "ornament-dot ornament-dot-top" }),
          e("div", { className: "english-text" }, c.en),
          e("div", { className: "tap-hint" }, "tap to flip back"),
          e("div", { className: "ornament ornament-bottom" }),
          e("div", { className: "ornament-dot ornament-dot-bottom" })
        )
      )
    );
  }

  return e("div", { className: "app" },
    // Header
    e("div", { style: { padding: "16px 20px 12px", display: "flex", justifyContent: "space-between", alignItems: "center", flexShrink: 0 } },
      view === "study"
        ? [
            e("span", { key: "t", style: { fontSize: "12px", color: "rgba(212,168,84,0.45)", letterSpacing: "0.2em", textTransform: "uppercase" } }, "Qur'anic Phrases"),
            e("div", { key: "btns", style: { display: "flex", gap: "8px", alignItems: "center" } },
              e("button", { className: "header-btn", onClick: reshuffle }, ShuffleSvg(), " Reshuffle"),
              e("button", { className: "header-btn", onClick: openReview },
                ListSvg(), " Review",
                marked.size > 0 ? e("span", { className: "badge" }, marked.size) : null
              )
            )
          ]
        : [
            e("button", { key: "back", className: "header-btn", onClick: () => setView("study") }, BackSvg(), " Back to Study"),
            e("div", { key: "rh", style: { display: "flex", gap: "8px", alignItems: "center" } },
              marked.size > 0 ? e("button", { className: "header-btn", onClick: () => { setMarked(new Set()); setReviewDeck([]); }, style: { color: "rgba(212,168,84,0.5)" } }, "Clear All") : null,
              e("span", { style: { fontSize: "12px", color: "rgba(212,168,84,0.45)", letterSpacing: "0.15em", textTransform: "uppercase" } }, "Review (" + marked.size + ")")
            )
          ]
    ),
    // Progress
    cDeck.length > 0 ? e("div", { style: { padding: "0 20px 8px" } },
      e("div", { className: "progress-track" },
        e("div", { className: "progress-fill", style: { width: ((cIdx + 1) / cDeck.length * 100) + "%" } })
      ),
      e("div", { style: { textAlign: "center", marginTop: "6px", fontSize: "12px", color: "rgba(212,168,84,0.35)", letterSpacing: "0.15em" } },
        (cIdx + 1) + " / " + cDeck.length
      )
    ) : null,
    // Main
    e("div", { style: { flex: 1, display: "flex", flexDirection: "column", justifyContent: "center", padding: "8px 20px 16px" }, onTouchStart: onTS, onTouchEnd: onTE },
      view === "review" && reviewDeck.length === 0
        ? e("div", { className: "empty-state" },
            e("div", { style: { fontSize: "48px", marginBottom: "16px", opacity: 0.3 } }, "\u263D"),
            e("div", { style: { fontSize: "18px", color: "rgba(245,237,224,0.5)", marginBottom: "8px" } }, "No phrases marked yet"),
            e("div", { style: { fontSize: "14px", color: "rgba(212,168,84,0.35)" } }, "Tap the bookmark icon while studying to add phrases here")
          )
        : card ? renderCard(card, cFlip, () => setCFlip(f => !f), view + "-" + cIdx) : null
    ),
    // Bottom controls
    cDeck.length > 0 && card ? e("div", { style: { padding: "8px 20px 28px", flexShrink: 0 } },
      e("div", { style: { display: "flex", justifyContent: "center", marginBottom: "14px" } },
        e("button", { className: "mark-btn" + (marked.has(card.id) ? " active" : ""), onClick: toggleMark },
          BookmarkSvg(marked.has(card.id)), marked.has(card.id) ? " Marked" : " Mark for Review"
        )
      ),
      e("div", { style: { display: "flex", justifyContent: "center", gap: "12px" } },
        e("button", { className: "nav-btn", onClick: goPrev, disabled: cIdx === 0 }, ChevLeft(), " Previous"),
        e("button", { className: "nav-btn", onClick: goNext, disabled: cIdx === cDeck.length - 1 }, "Next ", ChevRight())
      )
    ) : null
  );
}

ReactDOM.render(e(App), document.getElementById("root"));
</script>
