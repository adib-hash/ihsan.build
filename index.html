<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ihsan.build</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400&family=Inter:wght@300;400&family=Amiri:ital@1&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #faf7f2;
            color: #3a2e22;
            font-family: 'Inter', sans-serif;
            font-weight: 300;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 3rem 1.5rem;
        }

        .wrapper {
            width: 100%;
            max-width: 520px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3rem;
        }

        /* —— Header —— */
        .header {
            text-align: center;
        }

        .wordmark {
            font-family: 'Cinzel', serif;
            font-size: 0.85rem;
            letter-spacing: 0.28em;
            text-transform: uppercase;
            color: #b5956a;
            margin-bottom: 2.5rem;
        }

        .headline {
            font-family: 'Cinzel', serif;
            font-size: clamp(1.75rem, 5vw, 2.5rem);
            font-weight: 400;
            color: #2a1f14;
            line-height: 1.25;
            margin-bottom: 1rem;
        }

        .subline {
            font-family: 'Amiri', serif;
            font-style: italic;
            font-size: 1.05rem;
            color: #9c8268;
            line-height: 1.7;
        }

        /* —— Cards —— */
        .cards {
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.875rem;
        }

        @media (max-width: 420px) {
            .cards { grid-template-columns: 1fr; }
        }

        .card {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
            padding: 1.25rem 1.375rem;
            background: #fff;
            border: 1px solid #e8ddd0;
            border-radius: 6px;
            text-decoration: none;
            color: inherit;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .card:hover {
            border-color: #c9a87a;
            box-shadow: 0 2px 12px rgba(181,149,106,0.1);
        }

        .card-label {
            font-size: 0.65rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: #b5956a;
        }

        .card-title {
            font-family: 'Cinzel', serif;
            font-size: 0.95rem;
            font-weight: 400;
            color: #2a1f14;
        }

        .card-desc {
            font-size: 0.8rem;
            line-height: 1.6;
            color: #9c8268;
        }

        /* —— Footer —— */
        .footer {
            font-size: 0.7rem;
            letter-spacing: 0.12em;
            color: #c4b09a;
        }
    </style>
</head>
<body>
    <div class="wrapper">

        <header class="header">
            <div class="wordmark">ihsan.build</div>
            <h1 class="headline">Under construction.</h1>
            <p class="subline">Good things take time.</p>
        </header>

        <div class="cards">
            <a class="card" href="https://adib.ihsan.build" target="_blank" rel="noopener">
                <div class="card-label">Personal</div>
                <div class="card-title">Adib</div>
                <div class="card-desc">Writing, projects, and what I'm building.</div>
            </a>
            <a class="card" href="https://ship.ihsan.build" target="_blank" rel="noopener">
                <div class="card-label">Program</div>
                <div class="card-title">Ship</div>
                <div class="card-desc">A 6-week AI-native build program for curious students.</div>
            </a>
        </div>

        <footer class="footer">&copy; 2026 ihsan.build</footer>

    </div>
</body>
</html>
