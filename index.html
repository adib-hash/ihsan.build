<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ihsan.build</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Inter:wght@300;400;500&family=Amiri:ital@0;1&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #080c14;
            --surface: rgba(255,255,255,0.03);
            --border: rgba(255,255,255,0.07);
            --border-hover: rgba(99,157,255,0.35);
            --text: #e2e8f0;
            --muted: #64748b;
            --accent: #638cff;
            --accent-glow: rgba(99,140,255,0.18);
        }

        html, body {
            height: 100%;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-weight: 300;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem 1.5rem;
            overflow-x: hidden;
        }

        /* Subtle radial glow behind content */
        body::before {
            content: '';
            position: fixed;
            top: 30%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 700px;
            height: 500px;
            background: radial-gradient(ellipse at center, rgba(99,140,255,0.07) 0%, transparent 70%);
            pointer-events: none;
        }

        .wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 680px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3rem;
        }

        /* —— Header —— */
        .header {
            text-align: center;
        }

        .wordmark {
            font-family: 'Cinzel', serif;
            font-size: clamp(1.25rem, 4vw, 1.6rem);
            font-weight: 400;
            letter-spacing: 0.18em;
            color: var(--accent);
            margin-bottom: 2rem;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.35rem 0.9rem;
            border: 1px solid var(--border);
            border-radius: 999px;
            font-size: 0.7rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 1.75rem;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent);
            opacity: 0.7;
            animation: pulse 2.4s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.4; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.25); }
        }

        .headline {
            font-family: 'Cinzel', serif;
            font-size: clamp(2rem, 6vw, 3rem);
            font-weight: 400;
            color: #f1f5f9;
            line-height: 1.2;
            margin-bottom: 1rem;
        }

        .subline {
            font-family: 'Amiri', serif;
            font-style: italic;
            font-size: clamp(1rem, 2.5vw, 1.2rem);
            color: var(--muted);
            line-height: 1.6;
            max-width: 420px;
            margin: 0 auto;
        }

        /* —— Divider —— */
        .divider {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }
        .divider-label {
            font-size: 0.65rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--muted);
        }

        /* —— Cards —— */
        .cards {
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        @media (max-width: 480px) {
            .cards { grid-template-columns: 1fr; }
        }

        .card {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            padding: 1.5rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            text-decoration: none;
            color: inherit;
            transition: border-color 0.25s, background 0.25s, transform 0.2s;
            position: relative;
            overflow: hidden;
        }

        .card::after {
            content: '';
            position: absolute;
            inset: 0;
            background: var(--accent-glow);
            opacity: 0;
            transition: opacity 0.25s;
        }

        .card:hover {
            border-color: var(--border-hover);
            background: rgba(255,255,255,0.05);
            transform: translateY(-2px);
        }

        .card:hover::after {
            opacity: 1;
        }

        .card-icon {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            background: rgba(99,140,255,0.1);
            border: 1px solid rgba(99,140,255,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 1;
        }

        .card-icon svg {
            width: 18px;
            height: 18px;
            stroke: var(--accent);
            fill: none;
            stroke-width: 1.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .card-content {
            position: relative;
            z-index: 1;
            flex: 1;
        }

        .card-label {
            font-size: 0.65rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 0.3rem;
        }

        .card-title {
            font-family: 'Cinzel', serif;
            font-weight: 400;
            font-size: 1rem;
            color: #f1f5f9;
            margin-bottom: 0.5rem;
        }

        .card-desc {
            font-size: 0.82rem;
            line-height: 1.6;
            color: var(--muted);
        }

        .card-link {
            position: relative;
            z-index: 1;
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            font-size: 0.7rem;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--accent);
            opacity: 0.7;
            transition: opacity 0.2s;
        }

        .card:hover .card-link {
            opacity: 1;
        }

        .card-link svg {
            width: 12px;
            height: 12px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            transition: transform 0.2s;
        }

        .card:hover .card-link svg {
            transform: translateX(2px);
        }

        /* —— Footer —— */
        .footer {
            font-size: 0.72rem;
            letter-spacing: 0.1em;
            color: var(--muted);
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <div class="wrapper">

        <header class="header">
            <div class="wordmark">ihsan.build</div>

            <div class="status-badge">
                <span class="status-dot"></span>
                Under Construction
            </div>

            <h1 class="headline">Something is<br>being built.</h1>
            <p class="subline">Good things take time. Check back soon — or explore what's live below.</p>
        </header>

        <div class="divider">
            <span class="divider-label">Explore</span>
        </div>

        <div class="cards">

            <!-- adib.ihsan.build -->
            <a class="card" href="https://adib.ihsan.build" target="_blank" rel="noopener">
                <div class="card-icon">
                    <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
                </div>
                <div class="card-content">
                    <div class="card-label">Personal</div>
                    <div class="card-title">Adib</div>
                    <div class="card-desc">Writing, projects, and what I'm building.</div>
                </div>
                <span class="card-link">
                    Visit
                    <svg viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                </span>
            </a>

            <!-- ship.ihsan.build -->
            <a class="card" href="https://ship.ihsan.build" target="_blank" rel="noopener">
                <div class="card-icon">
                    <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
                </div>
                <div class="card-content">
                    <div class="card-label">Program</div>
                    <div class="card-title">Ship</div>
                    <div class="card-desc">A 6-week AI-native build program for curious students.</div>
                </div>
                <span class="card-link">
                    Visit
                    <svg viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                </span>
            </a>

        </div>

        <footer class="footer">&copy; 2026 ihsan.build</footer>

    </div>
</body>
</html>
